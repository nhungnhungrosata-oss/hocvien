<!doctype html>
<html lang="vi">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Học Viên Online</title>
<style>
:root{--bg:#f3f7ff;--ink:#0f172a;--txt:#334155;--mut:#64748b;--line:#e2e8f0;--pri:#2563eb;--pri2:#1d4ed8;--soft:#dbeafe;--org:#f97316;--shadow:0 24px 70px rgba(15,23,42,.12);--font:Inter,system-ui,-apple-system,"Segoe UI",Arial,sans-serif}
*{box-sizing:border-box}body{margin:0;font-family:var(--font);color:var(--txt);background:radial-gradient(circle at 5% 0,rgba(37,99,235,.18),transparent 32%),linear-gradient(180deg,var(--bg),#fff 75%);min-height:100vh}button{font:inherit;cursor:pointer}a{text-decoration:none;color:inherit}textarea,input,select{font:inherit}
.top{position:sticky;top:0;z-index:50;background:rgba(255,255,255,.88);backdrop-filter:blur(18px);border-bottom:1px solid var(--line)}.topin{max-width:1180px;margin:auto;padding:13px 18px;display:flex;align-items:center;justify-content:space-between;gap:16px}.brand{display:flex;align-items:center;gap:12px}.logo{width:48px;height:48px;border-radius:17px;background:linear-gradient(135deg,var(--pri),#60a5fa 60%,var(--org));color:#fff;display:grid;place-items:center;font-size:23px}h1{margin:0;color:var(--ink);font-size:21px}.brand p{margin:2px 0 0;color:var(--mut);font-size:12px;font-weight:700}.nav{display:flex;gap:6px;padding:5px;border:1px solid var(--line);background:#f8fafc;border-radius:999px}.nav button,.nav a{border:0;background:transparent;color:var(--mut);padding:10px 15px;border-radius:999px;font-weight:900;font-size:14px}.nav .on{background:linear-gradient(135deg,var(--pri),var(--pri2));color:#fff}
main{max-width:1180px;margin:auto;padding:26px 18px 80px}.hero{display:grid;grid-template-columns:1.35fr .65fr;gap:20px;margin-bottom:28px}.heroMain,.stat,.card,.playerBox,.listBox,.panel{background:rgba(255,255,255,.94);border:1px solid var(--line);box-shadow:var(--shadow)}.heroMain{border-radius:30px;padding:34px}.badge{display:inline-flex;background:var(--soft);color:#1e40af;padding:8px 12px;border-radius:999px;font-weight:950;font-size:13px;margin-bottom:15px}.hero h2,.heroMain h2{margin:0;color:var(--ink);font-size:clamp(32px,5vw,54px);line-height:1;letter-spacing:-.05em}.hero p,.heroMain p{margin:16px 0 0;color:var(--mut);font-size:16px}.heroBtns{display:flex;gap:10px;flex-wrap:wrap;margin-top:22px}.qbtn{border:0;border-radius:16px;padding:12px 16px;font-weight:950;background:var(--ink);color:#fff}.qbtn.light{background:#fff;color:var(--ink);border:1px solid var(--line)}.stats{display:grid;gap:13px}.stat{border-radius:24px;padding:20px}.stat span{display:block;color:var(--mut);font-weight:850;font-size:13px}.stat b{display:block;color:var(--ink);font-size:34px;margin-top:4px}.head{display:flex;align-items:end;justify-content:space-between;gap:14px;margin:22px 0 16px}.head h2{margin:0;color:var(--ink);font-size:28px}.head p{margin:5px 0 0;color:var(--mut);font-size:14px}.pill{background:#fff;border:1px solid var(--line);border-radius:999px;padding:9px 12px;color:var(--mut);font-weight:950;font-size:13px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(255px,1fr));gap:20px}.card{border-radius:24px;overflow:hidden;display:flex;flex-direction:column;transition:.2s}.card:hover{transform:translateY(-5px)}.thumb{aspect-ratio:16/9;background:linear-gradient(135deg,#dbeafe,#fff 55%,#ffedd5);position:relative;overflow:hidden;display:grid;place-items:center}.thumb img{width:100%;height:100%;object-fit:cover}.ph{width:74px;height:74px;border-radius:24px;background:linear-gradient(135deg,var(--pri),#60a5fa);color:#fff;display:grid;place-items:center;font-size:34px;font-weight:950}.tag{position:absolute;top:12px;left:12px;background:rgba(15,23,42,.82);color:#fff;border-radius:999px;padding:7px 11px;font-weight:950;font-size:12px}.play{position:absolute;right:12px;bottom:12px;width:42px;height:42px;border-radius:15px;background:#fff;color:var(--pri);display:grid;place-items:center;font-weight:950}.body{padding:17px;display:flex;flex-direction:column;gap:8px;flex:1}.body h3{margin:0;color:var(--ink);font-size:19px}.body p{margin:0;color:var(--mut);font-size:14px;flex:1}.meta{margin-top:8px;padding-top:12px;border-top:1px solid var(--line);display:flex;justify-content:space-between;gap:10px;color:var(--pri);font-size:13px;font-weight:950}.empty{border:1px dashed #cbd5e1;background:rgba(255,255,255,.75);border-radius:24px;padding:40px 20px;text-align:center;color:var(--mut)}.back{border:0;background:transparent;color:var(--pri);font-weight:950;padding:8px 0;margin-bottom:12px}.layout{display:grid;grid-template-columns:1.45fr .55fr;gap:22px;align-items:start}.playerBox,.listBox{border-radius:28px;overflow:hidden}.frame{width:100%;aspect-ratio:16/9;border:0;background:#020617;display:block}.lesson{padding:20px}.lesson h2{margin:0 0 7px;color:var(--ink)}.listBox{padding:16px;position:sticky;top:96px}.vlist{display:grid;gap:10px}.vbtn{width:100%;border:1px solid var(--line);background:#fff;border-radius:18px;padding:12px;display:flex;align-items:center;gap:11px;text-align:left}.vbtn.on{background:var(--soft);border-color:rgba(37,99,235,.45)}.num{width:34px;height:34px;border-radius:13px;background:var(--ink);color:#fff;display:grid;place-items:center;font-size:12px;font-weight:950}.promptGrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:20px}.promptImage{aspect-ratio:9/16;background:#e2e8f0;overflow:hidden}.promptImage img{width:100%;height:100%;object-fit:cover}.copyBtn{width:100%;border:0;border-radius:15px;padding:12px;background:linear-gradient(135deg,#2563eb,#7c3aed);color:#fff;font-weight:950}
.assistantWrap{display:grid;grid-template-columns:1fr .9fr;gap:20px;align-items:start}.panel{border-radius:28px;padding:22px}.panel h3{margin:0 0 12px;color:var(--ink);font-size:22px}.assistForm{display:grid;grid-template-columns:1fr 1fr;gap:13px}.field.full{grid-column:1/-1}.field label{display:flex;align-items:center;justify-content:space-between;gap:10px;margin:0 0 7px;color:var(--ink);font-size:13px;font-weight:950}.assistForm input,.assistForm textarea,.assistForm select,.outputBox textarea{width:100%;border:1px solid #dbe3ef;background:#fff;color:var(--txt);outline:0;border-radius:16px;padding:12px 13px;transition:.18s}.assistForm textarea{min-height:78px;resize:vertical}.outputBox textarea{min-height:620px;resize:vertical;white-space:pre-wrap}.assistForm input:focus,.assistForm textarea:focus,.assistForm select:focus,.outputBox textarea:focus{border-color:rgba(37,99,235,.62);box-shadow:0 0 0 4px rgba(37,99,235,.1)}.miniBtn{border:1px solid rgba(37,99,235,.18);background:#eff6ff;color:#1e40af;border-radius:999px;padding:5px 9px;font-size:11px;font-weight:950}.actions{display:flex;gap:10px;flex-wrap:wrap;margin-top:15px}.btn{border:0;border-radius:15px;padding:12px 14px;font-weight:950;background:linear-gradient(135deg,var(--pri),var(--pri2));color:#fff}.btn.sec{background:linear-gradient(135deg,#0f766e,#14b8a6)}.btn.ghost{background:#fff;color:var(--ink);border:1px solid var(--line)}.btn.orange{background:linear-gradient(135deg,#f97316,#fb923c)}.hint{font-size:12px;color:var(--mut);margin-top:8px}.toast{position:fixed;left:50%;bottom:22px;transform:translateX(-50%);background:#0f172a;color:#fff;padding:11px 15px;border-radius:14px;font-weight:850;opacity:0;pointer-events:none;z-index:99999}.toast.show{opacity:1}
@media(max-width:900px){.assistantWrap{grid-template-columns:1fr}.assistForm{grid-template-columns:1fr}.outputBox textarea{min-height:420px}}@media(max-width:800px){.topin{flex-direction:column;align-items:stretch}.nav{display:grid;grid-template-columns:repeat(4,1fr);border-radius:18px}.hero,.layout{grid-template-columns:1fr}.listBox{position:static}.grid{grid-template-columns:repeat(2,minmax(0,1fr));gap:12px}.heroMain{padding:24px;border-radius:24px}.hero h2,.heroMain h2{font-size:34px}.body h3{font-size:15px}.body p{font-size:12px}.promptGrid{grid-template-columns:repeat(2,minmax(0,1fr));gap:12px}}
</style>
</head>
<body>
<header class="top"><div class="topin"><div class="brand"><div class="logo">▶</div><div><h1>Học Viên Online</h1><p>Kho bài giảng video & app học tập</p></div></div><nav class="nav"><button id="nFree">📚 Miễn phí</button><button id="nAssistant">🤖 Tạo Trợ Lý</button><button id="nPrompts">🖼️ Prompt Ảnh</button><a href="/index.html#admin">⚙️ Quản trị</a></nav></div></header>
<main id="app"></main><div id="toast" class="toast"></div>
<script>
const R2_API_URL='https://hocvien-api.daitaigroup.workers.dev';
const S={courses:[],apps:[],prompts:[],view:'free',cid:null,vid:null};const app=document.getElementById('app');
const esc=v=>{let d=document.createElement('div');d.textContent=v==null?'':String(v);return d.innerHTML};const fl=t=>esc(((t||'Học').trim()[0]||'H').toUpperCase());
function toast(m){let e=document.getElementById('toast');e.textContent=m;e.classList.add('show');clearTimeout(window.tt);window.tt=setTimeout(()=>e.classList.remove('show'),1800)}
async function load(){try{const r=await fetch(R2_API_URL.replace(/\/+$/,'')+'/data?ts='+Date.now(),{cache:'no-store'});const d=await r.json();S.courses=Array.isArray(d.courses)?d.courses:[];S.apps=Array.isArray(d.apps)?d.apps:[];S.prompts=Array.isArray(d.prompts)?d.prompts:[];if(!S.prompts.length){const emb=[...S.courses,...S.apps].find(x=>Array.isArray(x._imagePrompts));S.prompts=emb?emb._imagePrompts:[]}}catch(e){app.innerHTML='<div class="empty">Không đọc được dữ liệu. Vui lòng kiểm tra R2 API.</div>'}}
function isPaid(c){return !!c&&(c.category==='advanced'||c.locked===true)}function freeCourses(){return S.courses.filter(c=>!isPaid(c))}function courseById(id){return S.courses.find(c=>c.id===id)}
function yid(u){u=(u||'').trim();for(let p of [/youtu\.be\/([\w-]{6,})/,/youtube\.com\/watch\?[^#]*v=([\w-]{6,})/,/youtube\.com\/embed\/([\w-]{6,})/,/youtube\.com\/shorts\/([\w-]{6,})/,/youtube\.com\/live\/([\w-]{6,})/]){let m=u.match(p);if(m)return m[1]}try{let x=new URL(u);return x.hostname.includes('youtube.com')?x.searchParams.get('v')||'':''}catch(e){return''}}
function did(u){u=(u||'').trim();if(!u.includes('drive.google.com'))return'';for(let p of [/drive\.google\.com\/file\/d\/([^/]+)/,/drive\.google\.com\/open\?id=([^&]+)/,/drive\.google\.com\/uc\?[^#]*id=([^&]+)/]){let m=u.match(p);if(m)return decodeURIComponent(m[1])}try{return new URL(u).searchParams.get('id')||''}catch(e){return''}}
function emb(u){let y=yid(u);if(y)return'https://www.youtube.com/embed/'+encodeURIComponent(y)+'?rel=0&modestbranding=1';let d=did(u);if(d)return'https://drive.google.com/file/d/'+encodeURIComponent(d)+'/preview';return(u||'').trim()}
function thumb(img,title,b){return `<div class="thumb"><div class="tag">${esc(b)}</div>${img?`<img src="${esc(img)}" alt="${esc(title)}" loading="lazy" onerror="this.remove()">`:`<div class="ph">${fl(title)}</div>`}<div class="play">▶</div></div>`}
function nav(){nFree.classList.toggle('on',S.view==='free'||S.view==='detail');nAssistant.classList.toggle('on',S.view==='assistant');nPrompts.classList.toggle('on',S.view==='prompts')}
function setRoute(h){location.hash=h;route()}window.setRoute=setRoute;
function heroFree(){return `<section class="hero"><div class="heroMain"><div class="badge">📚 Khóa Miễn Phí</div><h2>Học bài giảng video rõ ràng, gọn gàng</h2><p>Chọn khóa học miễn phí để bắt đầu xem bài giảng.</p><div class="heroBtns"><button class="qbtn" onclick="setRoute('free')">📚 Khóa miễn phí</button><button class="qbtn light" onclick="setRoute('assistant')">🤖 Tạo Trợ Lý</button></div></div><div class="stats"><div class="stat"><span>Khóa miễn phí</span><b>${freeCourses().length}</b></div><div class="stat"><span>Tạo Trợ Lý</span><b>1</b></div><div class="stat"><span>Prompt Ảnh</span><b>${S.prompts.length}</b></div></div></section>`}
function grid(list){return list.length?`<div class="grid">${list.map((c,i)=>`<article class="card course" data-id="${esc(c.id)}">${thumb(c.image,c.title,'Khóa '+String(i+1).padStart(2,'0'))}<div class="body"><h3>${esc(c.title)}</h3><p>${esc(c.description||'Chưa có mô tả.')}</p><div class="meta"><span>${(c.videos||[]).length} video</span><span>Miễn phí</span></div></div></article>`).join('')}</div>`:`<div class="empty">Chưa có khóa miễn phí.</div>`}
function bindCourses(){document.querySelectorAll('.course').forEach(x=>x.onclick=()=>{S.cid=x.dataset.id;S.vid=null;S.view='detail';location.hash='course='+encodeURIComponent(S.cid);render()})}
function pageFree(){let list=freeCourses();app.innerHTML=heroFree()+`<div class="head"><div><h2>Danh mục Khóa Miễn Phí</h2><p>Học viên có thể xem ngay.</p></div><div class="pill">📚 ${list.length} khóa</div></div>`+grid(list);bindCourses()}
const assistFields=[['brandName','Tên cá nhân / Thương hiệu','Ví dụ: Dược sĩ Ngoan'],['industry','Lĩnh vực','Ví dụ: Dược phẩm, nhà thuốc, chăm sóc sức khỏe'],['userRole','Vai trò AI','Ví dụ: Chuyên gia tư vấn nội dung nhà thuốc'],['nicheTopic','Chuyên đề / Ngách','Ví dụ: Xây kênh video AI cho dược sĩ'],['mainProduct','Sản phẩm / Dịch vụ chính','Ví dụ: khóa học, cộng đồng, công cụ AI'],['strengths','Điểm mạnh','Ví dụ: dễ hiểu, thực chiến, có mẫu sẵn'],['targetAudience','Khách hàng mục tiêu','Ví dụ: dược sĩ, chủ nhà thuốc'],['customerPainPoints','Nỗi đau khách hàng','Ví dụ: không biết viết nội dung, thiếu thời gian'],['customerDesires','Mong muốn khách hàng','Ví dụ: xây thương hiệu, có khách đều'],['customerBarriers','Rào cản mua hàng','Ví dụ: sợ khó dùng AI, sợ tốn tiền'],['customerMisconceptions','Hiểu sai phổ biến','Ví dụ: nghĩ AI chỉ dành cho người giỏi công nghệ'],['mustHaves','Điều bắt buộc phải có','Ví dụ: hook mạnh, CTA mềm, ví dụ thực tế'],['thingsToAvoid','Điều cần tránh','Ví dụ: hứa hẹn quá mức, từ ngữ vi phạm'],['forbiddenKeywords','Từ khóa cấm','Ví dụ: cam kết 100%, trị dứt điểm'],['replacementKeywords','Từ khóa thay thế','Ví dụ: hỗ trợ, góp phần, có thể cải thiện']];
function pageAssistant(){app.innerHTML=`<section class="heroMain"><div class="badge">🤖 Tạo Trợ Lý</div><h2>Tạo Prompt Master Chuyên Gia</h2><p>App chạy trực tiếp trên danh mục và tên miền này. Các nút AI dùng API cùng domain <b>/api/gemini</b> và đọc key từ biến môi trường như web gốc.</p></section><div class="assistantWrap"><section class="panel"><h3>Thông tin đầu vào</h3><div class="assistForm">${assistFields.map(([k,l,p])=>`<div class="field ${['customerPainPoints','customerDesires','customerBarriers','customerMisconceptions','mustHaves','thingsToAvoid','forbiddenKeywords','replacementKeywords'].includes(k)?'full':''}"><label>${l}<button class="miniBtn" type="button" onclick="suggestField('${k}')">Gợi ý</button></label>${['strengths','customerPainPoints','customerDesires','customerBarriers','customerMisconceptions','mustHaves','thingsToAvoid','forbiddenKeywords','replacementKeywords'].includes(k)?`<textarea id="${k}" placeholder="${p}"></textarea>`:`<input id="${k}" placeholder="${p}">`}</div>`).join('')}<div class="field full"><label>Phong cách đầu ra</label><select id="outputStyle"><option value="gần gũi, chuyên nghiệp, dễ hiểu">Gần gũi - chuyên nghiệp</option><option value="mạnh mẽ, thuyết phục, bán hàng mềm">Thuyết phục - bán hàng mềm</option><option value="giáo dục, khoa học, an toàn nền tảng">Giáo dục - khoa học</option><option value="truyền cảm hứng, dẫn dắt cộng đồng">Truyền cảm hứng</option></select></div></div><div class="actions"><button class="btn" onclick="generateAssistantPrompt()">🚀 Tạo Prompt Master</button><button class="btn ghost" onclick="clearAssistantForm()">Xóa form</button></div><div class="hint">Có thể nhập vài ý chính trước, sau đó bấm Gợi ý để AI tự bổ sung từng trường.</div></section><section class="panel outputBox"><h3>Kết quả Prompt Master</h3><textarea id="assistantOutput" placeholder="Prompt Master sẽ hiển thị tại đây..."></textarea><div class="actions"><button class="btn sec" onclick="copyAssistantPrompt()">📋 Copy</button><button class="btn ghost" onclick="downloadAssistantPrompt()">⬇️ Tải TXT</button><button class="btn orange" onclick="enhanceAssistantPrompt('shorten')">Rút gọn</button><button class="btn orange" onclick="enhanceAssistantPrompt('expand')">Mở rộng</button><button class="btn orange" onclick="enhanceAssistantPrompt('chatgpt')">Tối ưu ChatGPT</button><button class="btn orange" onclick="enhanceAssistantPrompt('gemini')">Tối ưu Gemini</button></div><div class="hint">Nếu chưa cấu hình key trên Vercel, hệ thống vẫn trả kết quả dự phòng cục bộ để app không bị lỗi.</div></section></div>`}
function assistantData(){let d={};assistFields.forEach(([k])=>{let el=document.getElementById(k);d[k]=el?el.value.trim():''});d.outputStyle=document.getElementById('outputStyle')?.value||'';return d}
async function suggestField(k){let btn=event?.target;if(btn){btn.disabled=true;btn.textContent='...'}try{const res=await fetch('/api/gemini/suggest-field',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({fieldKey:k,formData:assistantData()})});const data=await res.json();if(data.suggestion){document.getElementById(k).value=data.suggestion;toast(data.isFallback?'Đã dùng gợi ý dự phòng.':'Đã gợi ý bằng AI.')}else toast(data.error||'Không có gợi ý.')}catch(e){toast('Lỗi gọi API gợi ý.')}finally{if(btn){btn.disabled=false;btn.textContent='Gợi ý'}}}
function buildPrompt(d){return `# PROMPT MASTER CHUYÊN GIA\n\nBạn là ${d.userRole||'chuyên gia tư vấn nội dung và xây dựng thương hiệu'} cho ${d.brandName||'thương hiệu/cá nhân'}.\n\n## 1. BỐI CẢNH\n- Thương hiệu/cá nhân: ${d.brandName||'Chưa cung cấp'}\n- Lĩnh vực: ${d.industry||'Chưa cung cấp'}\n- Chuyên đề/ngách: ${d.nicheTopic||'Chưa cung cấp'}\n- Sản phẩm/dịch vụ chính: ${d.mainProduct||'Chưa cung cấp'}\n- Điểm mạnh: ${d.strengths||'Chưa cung cấp'}\n\n## 2. KHÁCH HÀNG MỤC TIÊU\n- Đối tượng: ${d.targetAudience||'Chưa cung cấp'}\n- Nỗi đau: ${d.customerPainPoints||'Chưa cung cấp'}\n- Mong muốn: ${d.customerDesires||'Chưa cung cấp'}\n- Rào cản: ${d.customerBarriers||'Chưa cung cấp'}\n- Hiểu sai phổ biến: ${d.customerMisconceptions||'Chưa cung cấp'}\n\n## 3. NHIỆM VỤ CỦA TRỢ LÝ\nHãy đóng vai chuyên gia trên để tạo nội dung, kịch bản, bài viết, ý tưởng video, kế hoạch triển khai và câu trả lời tư vấn phù hợp với bối cảnh trên. Nội dung phải tự nhiên, dễ hiểu, có tính ứng dụng và phù hợp người Việt.\n\n## 4. QUY TẮC BẮT BUỘC\n- Phong cách: ${d.outputStyle||'gần gũi, chuyên nghiệp, dễ hiểu'}\n- Điều bắt buộc phải có: ${d.mustHaves||'Hook rõ, nội dung dễ hiểu, ví dụ thực tế, CTA mềm.'}\n- Điều cần tránh: ${d.thingsToAvoid||'Không phóng đại, không cam kết tuyệt đối, không gây hiểu nhầm.'}\n- Từ khóa không dùng: ${d.forbiddenKeywords||'cam kết 100%, trị tận gốc, hiệu quả tức thì'}\n- Từ thay thế nên dùng: ${d.replacementKeywords||'hỗ trợ, góp phần, có thể cải thiện, đồng hành'}\n\n## 5. ĐỊNH DẠNG ĐẦU RA\nKhi tôi đưa chủ đề hoặc yêu cầu, hãy trả lời theo cấu trúc:\n1. Hook mở đầu mạnh\n2. Nội dung chính rõ ràng, chia ý dễ đọc\n3. Ví dụ thực tế nếu phù hợp\n4. Lời nhắc an toàn/chuyên môn nếu liên quan sức khỏe hoặc tài chính\n5. CTA mềm, tự nhiên\n\n## 6. CÁCH LÀM VIỆC\nNếu dữ liệu đầu vào chưa đủ, hãy hỏi lại tối đa 3 câu quan trọng. Nếu đủ dữ liệu, hãy làm ngay, không giải thích dài dòng.`}
function generateAssistantPrompt(){document.getElementById('assistantOutput').value=buildPrompt(assistantData());toast('Đã tạo Prompt Master.')} 
async function enhanceAssistantPrompt(action){const out=document.getElementById('assistantOutput');if(!out.value.trim())return toast('Chưa có prompt để xử lý.');toast('Đang gọi AI...');try{const res=await fetch('/api/gemini/enhance',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({prompt:out.value,action})});const data=await res.json();if(data.result){out.value=data.result;toast(data.isFallback?'Đã xử lý bằng chế độ dự phòng.':'Đã xử lý bằng AI.')}else toast(data.error||'Không xử lý được.')}catch(e){toast('Lỗi gọi API xử lý.')}}
function copyAssistantPrompt(){let v=document.getElementById('assistantOutput').value;if(!v)return toast('Chưa có nội dung.');navigator.clipboard.writeText(v).then(()=>toast('Đã copy prompt.')).catch(()=>prompt('Copy prompt:',v))}
function downloadAssistantPrompt(){let v=document.getElementById('assistantOutput').value;if(!v)return toast('Chưa có nội dung.');let a=document.createElement('a');a.href=URL.createObjectURL(new Blob([v],{type:'text/plain;charset=utf-8'}));a.download='prompt-master-tro-ly.txt';a.click();URL.revokeObjectURL(a.href)}
function clearAssistantForm(){assistFields.forEach(([k])=>{let el=document.getElementById(k);if(el)el.value=''});document.getElementById('assistantOutput').value='';toast('Đã xóa form.')}
function detail(){let c=courseById(S.cid);if(!c||isPaid(c))return setRoute('free');let vs=c.videos||[];if(!S.vid&&vs.length)S.vid=vs[0].id;let v=vs.find(x=>x.id===S.vid);app.innerHTML=`<button class="back" onclick="setRoute('free')">← Quay lại</button><div class="head"><div><h2>${esc(c.title)}</h2><p>${esc(c.description||'Danh sách bài giảng.')}</p></div><div class="pill">▶ ${vs.length} video</div></div><section class="layout"><div><div class="playerBox">${v?`<iframe class="frame" src="${esc(emb(v.url))}" allow="autoplay; fullscreen; picture-in-picture" allowfullscreen referrerpolicy="no-referrer"></iframe><div class="lesson"><h2>${esc(v.title)}</h2>${v.note?`<p>${esc(v.note)}</p>`:`<p>Đang phát video bài giảng đã chọn.</p>`}</div>`:`<div class="empty" style="margin:18px">Khóa học này chưa có video.</div>`}</div></div><aside class="listBox"><h3>Danh sách video</h3>${vs.length?`<div class="vlist">${vs.map((x,i)=>`<button class="vbtn ${x.id===S.vid?'on':''}" data-id="${esc(x.id)}"><span class="num">${String(i+1).padStart(2,'0')}</span><span><b>${esc(x.title)}</b><br><small>${x.id===S.vid?'Đang xem':'Bấm để xem'}</small></span></button>`).join('')}</div>`:`<div class="empty">Chưa có video.</div>`}</aside></section>`;document.querySelectorAll('.vbtn').forEach(b=>b.onclick=()=>{S.vid=b.dataset.id;detail();scrollTo({top:0,behavior:'smooth'})})}
window.copyImagePrompt=async function(i){let item=S.prompts[i];if(!item)return;try{await navigator.clipboard.writeText(item.prompt);toast('Đã copy prompt.')}catch(e){prompt('Copy prompt:',item.prompt)}}
function prompts(){let list=S.prompts||[];app.innerHTML=`<section class="heroMain"><div class="badge">🖼️ Prompt Tạo Ảnh</div><h2>Thư viện mẫu ảnh 9:16</h2><p>Copy prompt, dán vào ChatGPT hoặc Gemini kèm khuôn mặt của bạn để tạo ảnh.</p></section><div class="head"><div><h2>Danh sách Prompt</h2><p>Nhấn nút bên dưới mỗi ảnh để sao chép.</p></div><div class="pill">🖼️ ${list.length} mẫu</div></div>`+(list.length?`<div class="promptGrid">${list.map((p,i)=>`<article class="card"><div class="promptImage">${p.image?`<img src="${esc(p.image)}" alt="${esc(p.title||'Mẫu ảnh')}">`:''}</div><div class="body"><h3>${esc(p.title||('Mẫu ảnh '+(i+1)))}</h3><button class="copyBtn" onclick="copyImagePrompt(${i})">📋 Copy Prompt</button></div></article>`).join('')}</div>`:`<div class="empty">Chưa có prompt tạo ảnh.</div>`)}
function render(){nav();if(S.view==='assistant')pageAssistant();else if(S.view==='prompts')prompts();else if(S.view==='detail')detail();else pageFree()}
function route(){let h=(location.hash||'#free').replace('#','');let [k,v]=h.split('=');if(k==='assistant'||k==='advanced'||k==='apps')S.view='assistant';else if(k==='prompts')S.view='prompts';else if(k==='course'&&v){S.cid=decodeURIComponent(v);S.view='detail'}else S.view='free';render();scrollTo({top:0,behavior:'smooth'})}
nFree.onclick=()=>setRoute('free');nAssistant.onclick=()=>setRoute('assistant');nPrompts.onclick=()=>setRoute('prompts');window.addEventListener('hashchange',route);load().then(route);
</script>
</body>
</html>
