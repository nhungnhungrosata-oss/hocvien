<style>

.panel{padding:22px;margin-bottom:18px}.panelHead{display:flex;justify-content:space-between;gap:12px;padding-bottom:14px;margin-bottom:16px;border-bottom:1px solid var(--line)}.panel h2{margin:0;color:var(--ink);font-size:22px;letter-spacing:-.04em}.panel small{display:block;color:var(--mut);font-weight:650;margin-top:3px}.notice{display:flex;gap:10px;align-items:flex-start;border:1px solid rgba(37,99,235,.18);background:rgba(219,234,254,.6);border-radius:20px;padding:14px;color:#1e3a8a;font-size:13px;font-weight:650;margin-bottom:18px}.ni{width:28px;height:28px;border-radius:10px;background:#fff;display:grid;place-items:center;flex:0 0 auto}.form{display:grid;grid-template-columns:1fr 1fr;gap:13px}.field.full{grid-column:1/-1}label{display:block;margin:0 0 7px;color:var(--ink);font-size:13px;font-weight:950}input,textarea,select{width:100%;border:1px solid #dbe3ef;background:#fff;color:var(--txt);outline:0;border-radius:16px;padding:12px 13px;transition:.18s}textarea{min-height:78px;resize:vertical}input:focus,textarea:focus,select:focus{border-color:rgba(37,99,235,.62);box-shadow:0 0 0 4px rgba(37,99,235,.1)}.actions{display:flex;gap:10px;flex-wrap:wrap;margin-top:15px}.btn{background:linear-gradient(135deg,var(--pri),var(--pri2));color:#fff;box-shadow:0 12px 26px rgba(37,99,235,.18)}.btn.sec{background:linear-gradient(135deg,var(--green),#14b8a6)}.btn.red{background:linear-gradient(135deg,var(--red),#ef4444)}.btn.ghost{background:#fff;color:var(--ink);border:1px solid var(--line);box-shadow:none}
.adminList{display:grid;gap:14px}.adm{background:#fff;border:1px solid var(--line);border-radius:22px;padding:14px}.admRow{display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap}.admMain{display:flex;align-items:center;gap:13px;min-width:0;flex:1}.mini{width:82px;aspect-ratio:16/9;border:1px solid var(--line);border-radius:16px;overflow:hidden;background:linear-gradient(135deg,var(--soft),#fff,#ffedd5);display:grid;place-items:center;color:var(--pri);font-weight:950;font-size:22px;flex:0 0 auto}.mini img{width:100%;height:100%;object-fit:cover}.at{min-width:0}.at b{display:block;color:var(--ink);font-size:17px}.at small{display:block;color:var(--mut);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:620px}.small{border:1px solid var(--line);background:#fff;color:var(--ink);border-radius:14px;padding:9px 12px;font-weight:950;font-size:13px;transition:.18s}.small.red{color:var(--red);background:#fee2e2;border-color:rgba(220,38,38,.2)}.small.edit{color:var(--pri);background:var(--soft);border-color:rgba(37,99,235,.22)}.vadm{margin:12px 0 0 95px;display:grid;gap:9px}.vrow{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;border:1px solid var(--line);border-left:4px solid var(--pri);background:#f8fafc;border-radius:16px;padding:11px}.vrow b{color:var(--ink);font-size:13px}.vrow div div{color:var(--mut);font-size:12px;margin-top:2px}.addv{margin:14px 0 0 95px;padding-top:14px;border-top:1px dashed #cbd5e1}.videoActions{display:flex;gap:8px;flex-wrap:wrap}.editBox{display:none;margin-top:10px;border-top:1px dashed #cbd5e1;padding-top:12px}.editBox.show{display:block}.login{max-width:450px;margin:48px auto}.loginTop{text-align:center;margin-bottom:18px}.loginTop .logo{margin:0 auto 14px;width:60px;height:60px;border-radius:22px}.hint{color:var(--mut);font-size:12px;margin-top:8px;font-weight:650}.toast{position:fixed;right:18px;bottom:18px;z-index:100;max-width:330px;border-radius:18px;background:var(--ink);color:#fff;padding:13px 15px;box-shadow:var(--shadow);font-weight:850;opacity:0;pointer-events:none;transform:translateY(14px);transition:.24s}.toast.show{opacity:1;transform:translateY(0)}
.dataTools{display:grid;grid-template-columns:1fr 1fr;gap:12px}.fileInput{border:1px dashed #cbd5e1;background:#fff;border-radius:16px;padding:12px}.warn{border:1px solid rgba(249,115,22,.25);background:#fff7ed;color:#9a3412;border-radius:18px;padding:12px 14px;font-size:13px;font-weight:700}@media(max-width:680px){.dataTools{grid-template-columns:1fr}}@media(max-width:920px){.hero,.layout{grid-template-columns:1fr}.listBox{position:static}.vlist{max-height:none}.form{grid-template-columns:1fr}.addv,.vadm{margin-left:0}}@media(max-width:680px){.topin{padding:12px 14px;flex-direction:column;align-items:stretch}.logo{width:42px;height:42px;border-radius:15px;font-size:20px}.brand h1{font-size:19px}.brand p{font-size:11px}.nav{display:grid;grid-template-columns:repeat(3,1fr);border-radius:18px}.nav button{justify-content:center;padding:10px 6px;font-size:13px;border-radius:14px}main{padding:18px 14px 68px}.heroMain{border-radius:24px;padding:24px}.hero h2{font-size:34px}.hero p{font-size:14px}.stats{grid-template-columns:repeat(3,1fr);gap:8px}.stat{border-radius:18px;padding:14px 10px}.stat span{font-size:11px}.stat b{font-size:25px}.head{align-items:start;flex-direction:column;gap:8px}.head h2{font-size:24px}.grid{grid-template-columns:repeat(2,minmax(0,1fr));gap:12px}.card{border-radius:18px}.body{padding:12px}.body h3{font-size:15px}.body p{font-size:12px;-webkit-line-clamp:3}.meta{font-size:11px;gap:5px}.tag{top:8px;left:8px;font-size:10px;padding:5px 8px}.play{width:34px;height:34px;border-radius:12px;font-size:12px;right:8px;bottom:8px}.ph{width:52px;height:52px;border-radius:18px;font-size:25px}.playerBox,.listBox,.panel,.quickBox{border-radius:22px}.panel{padding:16px}.panelHead{flex-direction:column}.admRow{align-items:flex-start}.admMain{align-items:flex-start}.mini{width:72px}.at small{max-width:210px}.vrow{flex-direction:column}.toast{left:14px;right:14px;bottom:14px;max-width:none}}

<body>
<header class="top"><div class="topin"><div class="brand"><div class="logo">▶</div><div><h1>Học Viên Online</h1><p>Kho bài giảng video & app học tập</p></div></div><nav class="nav"><button id="nCourses" class="on">📚 Khóa học</button><button id="nApps">🧩 App</button><button id="nAdmin">🔐 Quản trị</button></nav></div></header>
<main id="app"></main><div id="toast" class="toast"></div>
<script>
const K='hocvien_courses',AK='hocvien_apps',PK='hocvien_admin_pass_hash',DEF='332123';
const DATA_FILE='luu-tru.json';
const LEGACY_C=['hocvien_courses_v1','hocvien_courses_v2','hocvien_courses_v3','hocvien_courses_v4','hocvien_courses_v5','courses_v1'],LEGACY_A=['hocvien_apps_v1','hocvien_apps_v2','hocvien_apps_v3','hocvien_apps_v4','hocvien_apps_v5','apps_v1'],LEGACY_P=['hocvien_admin_pass_hash_v1','hocvien_admin_pass_hash_v2','hocvien_admin_pass_hash_v3','hocvien_admin_pass_hash_v4','hocvien_admin_pass_hash_v5','admin_pass_v1'];
const S={view:'courses',courses:[],apps:[],cid:null,vid:null,admin:false};const app=document.getElementById('app');
const store={async get(k){try{if(window.storage?.get){let r=await window.storage.get(k,true);return r?r.value:null}}catch(e){}return localStorage.getItem(k)},async set(k,v){try{if(window.storage?.set){await window.storage.set(k,v,true);return}}catch(e){}localStorage.setItem(k,v)}};
const esc=v=>{let d=document.createElement('div');d.textContent=v==null?'':String(v);return d.innerHTML};const id=()=>Math.random().toString(36).slice(2,10)+Date.now().toString(36).slice(-4);const fl=t=>esc(((t||'Học').trim()[0]||'H').toUpperCase());
function toast(m){let e=document.getElementById('toast');e.textContent=m;e.classList.add('show');clearTimeout(window.tt);window.tt=setTimeout(()=>e.classList.remove('show'),2300)}
async function sha(t){let b=await crypto.subtle.digest('SHA-256',new TextEncoder().encode(t));return [...new Uint8Array(b)].map(x=>x.toString(16).padStart(2,'0')).join('')}
async function getAny(keys){for(let k of keys){let v=await store.get(k);if(v)return v}return null}
async function passHash(){let h=await store.get(PK)||await getAny(LEGACY_P);if(h){await store.set(PK,h);return h}h=await sha(DEF);await store.set(PK,h);return h}
async function setPass(p){await store.set(PK,await sha(p))}

async function loadFromStorageFile(){
  try{
    const res = await fetch(DATA_FILE + '?v=' + Date.now(), {cache:'no-store'});
    if(!res.ok) return null;
    const data = await res.json();
    if(Array.isArray(data.courses) && Array.isArray(data.apps)){
      return data;
    }
  }catch(e){}
  return null;
}

async function load(){
let fileData=null;
try{S.courses=JSON.parse(await store.get(K)||await getAny(LEGACY_C)||'[]')}catch(e){S.courses=[]}
try{S.apps=JSON.parse(await store.get(AK)||await getAny(LEGACY_A)||'[]')}catch(e){S.apps=[]}
if(!S.courses.length && !S.apps.length){
  fileData = await loadFromStorageFile();
  if(fileData){
    S.courses = fileData.courses || [];
    S.apps = fileData.apps || [];
    if(fileData.passHash) await store.set(PK,fileData.passHash);
  }
}
S.courses.forEach(c=>{c.relatedApps=c.relatedApps||[];(c.videos||[]).forEach(v=>v.id=v.id||id())});S.apps.forEach(a=>a.relatedCourses=a.relatedCourses||[]);await saveC();await saveA();
if(!S.courses.length&&!S.apps.length){let cid=id(),aid=id();S.courses=[{id:cid,title:'Khóa học mẫu',description:'Vào Quản trị để xóa khóa học mẫu và thêm bài giảng thật.',image:'',relatedApps:[aid],videos:[{id:id(),title:'Video hướng dẫn mẫu',url:'https://www.youtube.com/watch?v=dQw4w9WgXcQ',note:'Thay bằng link YouTube hoặc Google Drive của bạn trong phần Quản trị.'}]}];S.apps=[{id:aid,title:'App mẫu',url:'https://www.google.com',description:'Click để mở công cụ ở tab mới. Có thể xóa trong phần Quản trị.',image:'',relatedCourses:[cid]}]}await saveC();await saveA()}
async function saveC(){await store.set(K,JSON.stringify(S.courses))}async function saveA(){await store.set(AK,JSON.stringify(S.apps))}
function yid(u){u=(u||'').trim();for(let p of [/youtu\.be\/([\w-]{6,})/,/youtube\.com\/watch\?[^#]*v=([\w-]{6,})/,/youtube\.com\/embed\/([\w-]{6,})/,/youtube\.com\/shorts\/([\w-]{6,})/,/youtube\.com\/live\/([\w-]{6,})/]){let m=u.match(p);if(m)return m[1]}try{let x=new URL(u);return x.hostname.includes('youtube.com')?x.searchParams.get('v')||'':''}catch(e){return''}}
function did(u){u=(u||'').trim();if(!u.includes('drive.google.com'))return'';for(let p of [/drive\.google\.com\/file\/d\/([^/]+)/,/drive\.google\.com\/open\?id=([^&]+)/,/drive\.google\.com\/uc\?[^#]*id=([^&]+)/]){let m=u.match(p);if(m)return decodeURIComponent(m[1])}try{return new URL(u).searchParams.get('id')||''}catch(e){return''}}
function emb(u){let y=yid(u);if(y)return'https://www.youtube.com/embed/'+encodeURIComponent(y)+'?rel=0&modestbranding=1';let d=did(u);if(d)return'https://drive.google.com/file/d/'+encodeURIComponent(d)+'/preview';return(u||'').trim()}
function route(hash=location.hash){hash=(hash||'#courses').replace('#','');let [key,val]=hash.split('=');if(key==='apps'){S.view='apps'}else if(key==='admin'){S.view=S.admin?'admin':'login'}else if(key==='course'&&val){S.cid=decodeURIComponent(val);S.vid=null;S.view='detail'}else{S.view='courses';S.cid=null;S.vid=null}render();scrollTo({top:0,behavior:'smooth'})}
function setRoute(h){if(location.hash===h)route(h);else location.hash=h}
function nav(){nCourses.classList.toggle('on',['courses','detail'].includes(S.view));nApps.classList.toggle('on',S.view==='apps');nAdmin.classList.toggle('on',['admin','login'].includes(S.view))}
function render(){nav();({courses,detail,apps,login,admin})[S.view]()}
function totalV(){return S.courses.reduce((a,c)=>a+(c.videos||[]).length,0)}
function hero(t){let is=t==='apps';return `<section class="hero"><div class="heroMain"><div class="badge">${is?'🧩 Kho công cụ học tập':'🎓 Học video trực tuyến'}</div><h2>${is?'Tất cả app học tập trong một nơi':'Học bài giảng video rõ ràng, gọn gàng'}</h2><p>${is?'Gắn các link công cụ, bài tập, biểu mẫu, app luyện tập để học sinh mở nhanh trong tab mới.':'Học sinh chọn khóa học, xem bài giảng từ YouTube hoặc Google Drive qua trình phát nhúng. Có thể liên kết nhanh sang app liên quan.'}</p><div class="heroBtns"><button class="qbtn" onclick="setRoute('#courses')">📚 Xem khóa học</button><button class="qbtn light" onclick="setRoute('#apps')">🧩 Mở kho app</button></div></div><div class="stats"><div class="stat"><span>Khóa học</span><b>${S.courses.length}</b></div><div class="stat o"><span>Video bài giảng</span><b>${totalV()}</b></div><div class="stat g"><span>App / Link</span><b>${S.apps.length}</b></div></div></section>`}
function thumb(img,title,b,type){return `<div class="thumb"><div class="tag ${type==='app'?'app':''}">${esc(b)}</div>${img?`<img src="${esc(img)}" alt="${esc(title)}" loading="lazy" onerror="this.remove()">`:`<div class="ph">${fl(title)}</div>`}<div class="play">${type==='app'?'↗':'▶'}</div></div>`}
function appById(id){return S.apps.find(a=>a.id===id)}function courseById(id){return S.courses.find(c=>c.id===id)}
function courses(){app.innerHTML=hero('courses')+`<div class="head"><div><h2>Danh sách khóa học</h2><p>Chọn một khóa học để bắt đầu xem bài giảng.</p></div><div class="pill">📚 ${S.courses.length} khóa học</div></div>`+(S.courses.length?`<div class="grid">${S.courses.map((c,i)=>`<article class="card course" tabindex="0" data-id="${esc(c.id)}">${thumb(c.image,c.title,'Khóa '+String(i+1).padStart(2,'0'),'course')}<div class="body"><h3>${esc(c.title)}</h3><p>${esc(c.description||'Chưa có mô tả cho khóa học này.')}</p><div class="meta"><span>${(c.videos||[]).length} video</span><span>${(c.relatedApps||[]).length} app liên quan</span></div></div></article>`).join('')}</div>`:`<div class="empty">Chưa có khóa học nào. Vào mục <b>Quản trị</b> để thêm khóa học đầu tiên.</div>`);
document.querySelectorAll('.course').forEach(x=>{let f=()=>setRoute('#course='+encodeURIComponent(x.dataset.id));x.onclick=f;x.onkeydown=e=>{if(e.key==='Enter'||e.key===' ')f()}})}
function relatedApps(c){let list=(c.relatedApps||[]).map(appById).filter(Boolean);return `<div class="quickBox"><h3>App liên quan</h3>${list.length?`<div class="quickList">${list.map(a=>`<a class="quickItem" href="${esc(a.url)}" target="_blank" rel="noopener noreferrer"><span class="quickIcon">↗</span><span class="quickText"><b>${esc(a.title)}</b><span>${esc(a.description||'Mở app hỗ trợ khóa học')}</span></span></a>`).join('')}</div>`:`<div class="empty" style="padding:18px">Chưa gắn app liên quan cho khóa học này.</div>`}</div>`}
function detail(){let c=courseById(S.cid);if(!c){return setRoute('#courses')}let vs=c.videos||[];if(!S.vid&&vs.length)S.vid=vs[0].id;let v=vs.find(x=>x.id===S.vid);app.innerHTML=`<button class="back" onclick="setRoute('#courses')">← Quay lại danh sách khóa học</button><div class="head"><div><h2>${esc(c.title)}</h2><p>${esc(c.description||'Danh sách bài giảng của khóa học.')}</p></div><div class="pill">▶ ${vs.length} video</div></div><section class="layout"><div><div class="playerBox"><div class="playerTop"><div class="dots"><i></i><i></i><i></i></div><div class="safe">Có link nhanh: ${location.origin}${location.pathname}#course=${esc(c.id)}</div></div>${v?`<iframe class="frame" src="${esc(emb(v.url))}" allow="autoplay; fullscreen; picture-in-picture" allowfullscreen referrerpolicy="no-referrer"></iframe><div class="lesson"><h2>${esc(v.title)}</h2>${v.note?`<p>${esc(v.note)}</p>`:`<p>Đang phát video bài giảng đã chọn.</p>`}</div>`:`<div class="empty" style="margin:18px">Khóa học này chưa có video.</div>`}</div>${relatedApps(c)}</div><aside class="listBox"><h3>Danh sách video</h3>${vs.length?`<div class="vlist">${vs.map((x,i)=>`<button class="vbtn ${x.id===S.vid?'on':''}" data-id="${esc(x.id)}"><span class="num">${String(i+1).padStart(2,'0')}</span><span class="vt"><b>${esc(x.title)}</b><span>${x.id===S.vid?'Đang xem':'Bấm để xem video'}</span></span></button>`).join('')}</div>`:`<div class="empty">Chưa có video trong khóa học này.</div>`}<div class="actions"><button class="btn ghost" onclick="copyCourseLink('${esc(c.id)}')">Copy link khóa học</button></div></aside></section>`;
document.querySelectorAll('.vbtn').forEach(b=>b.onclick=()=>{S.vid=b.dataset.id;render();scrollTo({top:0,behavior:'smooth'})})}
function relatedCoursesForApp(a){let list=(a.relatedCourses||[]).map(courseById).filter(Boolean);return list.length?`<div class="meta"><span>${list.length} khóa học liên quan</span><span>${list.map(c=>esc(c.title)).join(', ')}</span></div>`:`<div class="meta"><span>Công cụ</span><span>Mở tab mới ↗</span></div>`}
function apps(){app.innerHTML=hero('apps')+`<div class="head"><div><h2>Kho App / Công cụ</h2><p>Click vào card để mở app hoặc dùng nút khóa học liên quan để quay lại học nhanh.</p></div><div class="pill">🧩 ${S.apps.length} app</div></div>`+(S.apps.length?`<div class="grid">${S.apps.map((a,i)=>`<div class="card"><a href="${esc(a.url)}" target="_blank" rel="noopener noreferrer">${thumb(a.image,a.title,'App '+String(i+1).padStart(2,'0'),'app')}</a><div class="body"><h3>${esc(a.title)}</h3><p>${esc(a.description||'Chưa có mô tả cho app này.')}</p>${relatedCoursesForApp(a)}${(a.relatedCourses||[]).map(courseById).filter(Boolean).map(c=>`<button class="qbtn light" style="justify-content:center" onclick="setRoute('#course=${esc(c.id)}')">📚 Vào ${esc(c.title)}</button>`).join('')}</div></div>`).join('')}</div>`:`<div class="empty">Chưa có app nào. Vào mục <b>Quản trị</b> để thêm app/link.</div>`)}
function login(){app.innerHTML=`<section class="panel login"><div class="loginTop"><div class="logo">🔐</div><div class="head" style="display:block;margin:0"><h2>Đăng nhập quản trị</h2><p>Quản lý khóa học, video bài giảng và kho app.</p></div></div><label>Mật khẩu quản trị</label><input id="pass" type="password" placeholder="Nhập mật khẩu"><div class="actions"><button class="btn" id="loginBtn">Đăng nhập</button></div></section>`;let p=document.getElementById('pass'),go=async()=>{if(await sha(p.value)===await passHash()){S.admin=true;S.view='admin';history.replaceState(null,'','#admin');render();toast('Đăng nhập quản trị thành công.')}else toast('Mật khẩu không đúng.')};loginBtn.onclick=go;p.onkeydown=e=>{if(e.key==='Enter')go()};setTimeout(()=>p.focus(),50)}
function mini(img,t){return `<div class="mini">${img?`<img src="${esc(img)}" alt="${esc(t)}" onerror="this.remove()">`:fl(t)}</div>`}
function optApps(sel=[]){return S.apps.map(a=>`<option value="${esc(a.id)}" ${sel.includes(a.id)?'selected':''}>${esc(a.title)}</option>`).join('')}
function optCourses(sel=[]){return S.courses.map(c=>`<option value="${esc(c.id)}" ${sel.includes(c.id)?'selected':''}>${esc(c.title)}</option>`).join('')}
function selectedValues(el){return [...el.selectedOptions].map(o=>o.value)}
function admin(){if(!S.admin){S.view='login';return render()}app.innerHTML=`<div class="head"><div><h2>Bảng quản trị</h2><p>Thêm khóa học, video, app, liên kết nhanh và đổi mật khẩu quản trị.</p></div><div class="pill">🔐 Admin</div></div><div class="notice"><div class="ni">💡</div><div>Dùng mục <b>Gắn App liên quan</b> trong khóa học và <b>Gắn khóa học liên quan</b> trong App để người dùng điều hướng nhanh hai chiều.</div></div><section class="panel"><div class="panelHead"><div><h2>File lưu trữ dữ liệu</h2><small>Dữ liệu nằm trong file luu-tru.json. Khi sửa app, chỉ thay index.html, không thay file này.</small></div></div><div class="warn">Để không mất dữ liệu: sau khi thêm/sửa khóa học, bấm <b>Xuất luu-tru.json</b> để tải file <b>luu-tru.json</b>. Khi cập nhật app, không xóa/không ghi đè file <b>luu-tru.json</b> này.</div><div class="actions"><button class="btn sec" id="exportDataBtn">Xuất luu-tru.json</button><label class="btn ghost" for="importDataFile">Nhập luu-tru.json</label><input id="importDataFile" type="file" accept="application/json,.json" style="display:none"></div></section><section class="panel"><div class="panelHead"><div><h2>Thêm khóa học mới</h2><small>Nhập tên, mô tả, ảnh đại diện và app liên quan nếu có.</small></div></div><div class="form"><div class="field"><label>Tên khóa học</label><input id="ct" placeholder="Ví dụ: Toán 9 - Chương 1"></div><div class="field"><label>Link hình đại diện</label><input id="ci" placeholder="https://..."></div><div class="field full"><label>Mô tả ngắn</label><textarea id="cd" placeholder="Mô tả ngắn về nội dung khóa học"></textarea></div><div class="field full"><label>Gắn App liên quan</label><select id="crApps" multiple size="4">${optApps()}</select><div class="hint">Giữ Ctrl để chọn nhiều app trên máy tính.</div></div></div><div class="actions"><button class="btn" id="addC">+ Thêm khóa học</button></div></section><section class="panel"><div class="panelHead"><div><h2>Danh sách khóa học</h2><small>Quản lý khóa học, video và app liên quan.</small></div></div><div id="adminC" class="adminList"></div></section><section class="panel"><div class="panelHead"><div><h2>Thêm App / Link</h2><small>Thêm công cụ học tập và gắn với khóa học liên quan.</small></div></div><div class="form"><div class="field"><label>Tên app</label><input id="at" placeholder="Ví dụ: Bài tập trắc nghiệm"></div><div class="field"><label>Link app</label><input id="au" placeholder="https://..."></div><div class="field"><label>Link hình đại diện</label><input id="ai" placeholder="https://..."></div><div class="field full"><label>Mô tả ngắn</label><textarea id="ad" placeholder="Mô tả ngắn về app/công cụ"></textarea></div><div class="field full"><label>Gắn khóa học liên quan</label><select id="arCourses" multiple size="4">${optCourses()}</select></div></div><div class="actions"><button class="btn sec" id="addA">+ Thêm app</button></div></section><section class="panel"><div class="panelHead"><div><h2>Danh sách App</h2><small>Xem ảnh thu nhỏ, mô tả, liên kết khóa học và xóa app.</small></div></div><div id="adminA" class="adminList"></div></section><section class="panel"><div class="panelHead"><div><h2>Bảo mật quản trị</h2><small>Đổi mật khẩu và đăng xuất tài khoản quản trị.</small></div></div><div class="form"><div><label>Mật khẩu mới</label><input id="np1" type="password" placeholder="Nhập mật khẩu mới"></div><div><label>Nhập lại mật khẩu mới</label><input id="np2" type="password" placeholder="Nhập lại mật khẩu mới"></div></div><div class="actions"><button class="btn sec" id="chg">Cập nhật mật khẩu</button><button class="btn red" id="out">Đăng xuất</button></div></section>`;addC.onclick=addCourse;addA.onclick=addApp;chg.onclick=changePass;out.onclick=()=>{S.admin=false;setRoute('#courses');toast('Đã đăng xuất quản trị.')};exportDataBtn.onclick=exportData;importDataFile.onchange=importData;adminCourses();adminApps()}
function syncAppLinks(courseId,oldIds,newIds){S.apps.forEach(a=>{a.relatedCourses=(a.relatedCourses||[]).filter(x=>x!==courseId)});newIds.forEach(aid=>{let a=appById(aid);if(a&&!a.relatedCourses.includes(courseId))a.relatedCourses.push(courseId)})}
function syncCourseLinks(appId,oldIds,newIds){S.courses.forEach(c=>{c.relatedApps=(c.relatedApps||[]).filter(x=>x!==appId)});newIds.forEach(cid=>{let c=courseById(cid);if(c&&!c.relatedApps.includes(appId))c.relatedApps.push(appId)})}
async function addCourse(){let title=ct.value.trim(),description=cd.value.trim(),image=ci.value.trim(),relatedApps=selectedValues(crApps);if(!title)return toast('Vui lòng nhập tên khóa học.');let cid=id();S.courses.unshift({id:cid,title,description,image,relatedApps,videos:[]});syncAppLinks(cid,[],relatedApps);await saveC();await saveA();ct.value=cd.value=ci.value='';admin();toast('Đã thêm khóa học.')}
async function addApp(){let title=at.value.trim(),url=au.value.trim(),description=ad.value.trim(),image=ai.value.trim(),relatedCourses=selectedValues(arCourses);if(!title||!url)return toast('Vui lòng nhập tên app và link app.');let aid=id();S.apps.unshift({id:aid,title,url,description,image,relatedCourses});syncCourseLinks(aid,[],relatedCourses);await saveA();await saveC();at.value=au.value=ad.value=ai.value='';admin();toast('Đã thêm app.')}
async function changePass(){if(!np1.value||np1.value.length<4)return toast('Mật khẩu nên có ít nhất 4 ký tự.');if(np1.value!==np2.value)return toast('Hai mật khẩu mới chưa trùng nhau.');await setPass(np1.value);np1.value=np2.value='';toast('Đã cập nhật mật khẩu quản trị.')}
function adminCourses(){let w=adminC;if(!S.courses.length){w.innerHTML='<div class="empty">Chưa có khóa học.</div>';return}w.innerHTML=S.courses.map(c=>`<div class="adm"><div class="admRow"><div class="admMain">${mini(c.image,c.title)}<div class="at"><b>${esc(c.title)}</b><small>${esc(c.description||'Chưa có mô tả.')}</small><small>${(c.videos||[]).length} video · ${(c.relatedApps||[]).length} app liên quan</small></div></div><div class="videoActions"><button class="small edit" data-act="ec" data-id="${esc(c.id)}">Sửa khóa học</button><button class="small" onclick="copyCourseLink('${esc(c.id)}')">Copy link</button><button class="small red" data-act="dc" data-id="${esc(c.id)}">Xóa khóa học</button></div></div><div class="editBox" data-cbox="${esc(c.id)}"><div class="form"><div><label>Tên khóa học</label><input class="ect" data-id="${esc(c.id)}" value="${esc(c.title)}"></div><div><label>Link hình đại diện</label><input class="eci" data-id="${esc(c.id)}" value="${esc(c.image||'')}"></div><div class="field full"><label>Mô tả</label><textarea class="ecd" data-id="${esc(c.id)}">${esc(c.description||'')}</textarea></div><div class="field full"><label>App liên quan</label><select class="ecApps" data-id="${esc(c.id)}" multiple size="4">${optApps(c.relatedApps||[])}</select></div></div><div class="actions"><button class="btn sec" data-act="sc" data-id="${esc(c.id)}">Lưu khóa học</button><button class="btn ghost" data-act="cc" data-id="${esc(c.id)}">Hủy</button></div></div><div class="vadm">${(c.videos||[]).map((v,i)=>`<div class="vrow"><div style="flex:1"><b>${String(i+1).padStart(2,'0')}. ${esc(v.title)}</b>${v.note?`<div>${esc(v.note)}</div>`:''}<div class="editBox" data-vbox="${esc(v.id)}"><div class="form"><div><label>Tên video</label><input class="evt" data-c="${esc(c.id)}" data-v="${esc(v.id)}" value="${esc(v.title)}"></div><div><label>Link YouTube / Google Drive</label><input class="evu" data-c="${esc(c.id)}" data-v="${esc(v.id)}" value="${esc(v.url)}"></div><div class="field full"><label>Ghi chú</label><textarea class="evn" data-c="${esc(c.id)}" data-v="${esc(v.id)}">${esc(v.note||'')}</textarea></div></div><div class="actions"><button class="btn sec" data-act="sv" data-c="${esc(c.id)}" data-v="${esc(v.id)}">Lưu video</button><button class="btn ghost" data-act="cv" data-v="${esc(v.id)}">Hủy</button></div></div></div><div class="videoActions"><button class="small edit" data-act="ev" data-v="${esc(v.id)}">Sửa video</button><button class="small red" data-act="dv" data-c="${esc(c.id)}" data-v="${esc(v.id)}">Xóa video</button></div></div>`).join('')}</div><div class="addv"><div class="form"><div><label>Tên video</label><input class="vtitle" data-c="${esc(c.id)}" placeholder="Ví dụ: Bài 1 - Giới thiệu"></div><div><label>Link YouTube / Google Drive</label><input class="vurl" data-c="${esc(c.id)}" placeholder="Dán link video tại đây"></div><div class="field full"><label>Ghi chú</label><textarea class="vnote" data-c="${esc(c.id)}" placeholder="Ghi chú tùy chọn cho học sinh"></textarea></div></div><div class="actions"><button class="btn sec" data-act="av" data-c="${esc(c.id)}">+ Thêm video</button></div></div></div>`).join('');
w.querySelectorAll('[data-act=ec]').forEach(b=>b.onclick=()=>w.querySelector(`[data-cbox="${CSS.escape(b.dataset.id)}"]`).classList.add('show'));

w.querySelectorAll('[data-act=dc]').forEach(b=>b.onclick=async()=>{let c=courseById(b.dataset.id);if(c&&confirm('Xóa khóa học '+c.title+' và toàn bộ video bên trong?')){S.courses=S.courses.filter(x=>x.id!==b.dataset.id);S.apps.forEach(a=>a.relatedCourses=(a.relatedCourses||[]).filter(x=>x!==b.dataset.id));await saveC();await saveA();adminCourses();adminApps();toast('Đã xóa khóa học.')}});

w.querySelectorAll('[data-act=dv]').forEach(b=>b.onclick=async()=>{let c=courseById(b.dataset.c);if(!c)return;c.videos=(c.videos||[]).filter(v=>v.id!==b.dataset.v);await saveC();adminCourses();toast('Đã xóa video.')});
w.querySelectorAll('[data-act=av]').forEach(b=>b.onclick=async()=>{let c=courseById(b.dataset.c);if(!c)return;let t=w.querySelector(`.vtitle[data-c="${CSS.escape(c.id)}"]`).value.trim(),u=w.querySelector(`.vurl[data-c="${CSS.escape(c.id)}"]`).value.trim(),n=w.querySelector(`.vnote[data-c="${CSS.escape(c.id)}"]`).value.trim();if(!t||!u)return toast('Vui lòng nhập tên video và link video.');c.videos=c.videos||[];c.videos.push({id:id(),title:t,url:u,note:n});await saveC();adminCourses();toast('Đã thêm video.')})}
function adminApps(){let w=adminA;if(!S.apps.length){w.innerHTML='<div class="empty">Chưa có app.</div>';return}w.innerHTML=S.apps.map(a=>`<div class="adm"><div class="admRow"><div class="admMain">${mini(a.image,a.title)}<div class="at"><b>${esc(a.title)}</b><small>${esc(a.description||'Chưa có mô tả.')}</small><small>${(a.relatedCourses||[]).length} khóa học liên quan · ${esc(a.url)}</small></div></div><div class="videoActions"><button class="small edit" data-act="ea" data-id="${esc(a.id)}">Sửa khóa học</button><a class="small" href="${esc(a.url)}" target="_blank" rel="noopener noreferrer">Mở app</a><button class="small red" data-act="da" data-id="${esc(a.id)}">Xóa app</button></div></div><div class="editBox" data-abox="${esc(a.id)}"><div class="form"><div><label>Tên app</label><input class="eat" data-id="${esc(a.id)}" value="${esc(a.title)}"></div><div><label>Link app</label><input class="eau" data-id="${esc(a.id)}" value="${esc(a.url)}"></div><div><label>Link hình đại diện</label><input class="eai" data-id="${esc(a.id)}" value="${esc(a.image||'')}"></div><div class="field full"><label>Mô tả</label><textarea class="ead" data-id="${esc(a.id)}">${esc(a.description||'')}</textarea></div><div class="field full"><label>Khóa học liên quan</label><select class="eaCourses" data-id="${esc(a.id)}" multiple size="4">${optCourses(a.relatedCourses||[])}</select></div></div><div class="actions"><button class="btn sec" data-act="sa" data-id="${esc(a.id)}">Lưu app</button><button class="btn ghost" data-act="ca" data-id="${esc(a.id)}">Hủy</button></div></div></div>`).join('');
w.querySelectorAll('[data-act=ea]').forEach(b=>b.onclick=()=>w.querySelector(`[data-abox="${CSS.escape(b.dataset.id)}"]`).classList.add('show'));
w.querySelectorAll('[data-act=ca]').forEach(b=>b.onclick=()=>w.querySelector(`[data-abox="${CSS.escape(b.dataset.id)}"]`).classList.remove('show'));
w.querySelectorAll('[data-act=sa]').forEach(b=>b.onclick=async()=>{let a=appById(b.dataset.id);if(!a)return;let old=a.relatedCourses||[],rel=selectedValues(w.querySelector(`.eaCourses[data-id="${CSS.escape(a.id)}"]`));a.title=w.querySelector(`.eat[data-id="${CSS.escape(a.id)}"]`).value.trim()||a.title;a.url=w.querySelector(`.eau[data-id="${CSS.escape(a.id)}"]`).value.trim()||a.url;a.image=w.querySelector(`.eai[data-id="${CSS.escape(a.id)}"]`).value.trim();a.description=w.querySelector(`.ead[data-id="${CSS.escape(a.id)}"]`).value.trim();a.relatedCourses=rel;syncCourseLinks(a.id,old,rel);await saveA();await saveC();adminApps();adminCourses();toast('Đã cập nhật app và liên kết.')});
w.querySelectorAll('[data-act=da]').forEach(b=>b.onclick=async()=>{let a=appById(b.dataset.id);if(a&&confirm('Xóa app '+a.title+'?')){S.apps=S.apps.filter(x=>x.id!==b.dataset.id);S.courses.forEach(c=>c.relatedApps=(c.relatedApps||[]).filter(x=>x!==b.dataset.id));await saveA();await saveC();adminApps();adminCourses();toast('Đã xóa app.')}})}

function downloadFile(name,text){let blob=new Blob([text],{type:'application/json'});let a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=name;document.body.appendChild(a);a.click();a.remove();setTimeout(()=>URL.revokeObjectURL(a.href),1000)}
async function exportData(){let data={version:1,exportedAt:new Date().toISOString(),courses:S.courses,apps:S.apps,passHash:await store.get(PK)};let stamp=new Date().toISOString().slice(0,10);downloadFile('luu-tru.json',JSON.stringify(data,null,2));toast('Đã xuất file luu-tru.json. Hãy giữ file này và không ghi đè khi sửa app.')}
async function importData(e){let file=e.target.files&&e.target.files[0];if(!file)return;try{let text=await file.text();let data=JSON.parse(text);if(!Array.isArray(data.courses)||!Array.isArray(data.apps)){toast('File backup không đúng định dạng.');return}if(!confirm('Nhập dữ liệu sẽ ghi đè dữ liệu hiện tại. Tiếp tục?'))return;S.courses=data.courses;S.apps=data.apps;S.courses.forEach(c=>{c.relatedApps=c.relatedApps||[];(c.videos||[]).forEach(v=>v.id=v.id||id())});S.apps.forEach(a=>a.relatedCourses=a.relatedCourses||[]);await saveC();await saveA();if(data.passHash)await store.set(PK,data.passHash);admin();toast('Đã nhập dữ liệu thành công.')}catch(err){toast('Không đọc được file backup.')}finally{e.target.value=''}}

async function copyCourseLink(cid){let url=location.origin+location.pathname+'#course='+cid;try{await navigator.clipboard.writeText(url);toast('Đã copy link khóa học.')}catch(e){prompt('Copy link khóa học:',url)}}
function goCourses(){setRoute('#courses')}function goApps(){setRoute('#apps')}
nCourses.onclick=()=>setRoute('#courses');nApps.onclick=()=>setRoute('#apps');nAdmin.onclick=()=>setRoute('#admin');window.addEventListener('hashchange',()=>route());
(async()=>{app.innerHTML='<div class="empty">Đang tải dữ liệu...</div>';await passHash();await load();route(location.hash||'#courses')})();
</script>
