<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lớp Học Video</title>
  <style>
    :root{
      --bg:#f4efe6;
      --surface:#fffaf2;
      --surface-2:#ffffff;
      --ink:#1f2933;
      --muted:#6b6258;
      --line:#ded1bd;
      --brand:#b4532a;
      --brand-2:#244e46;
      --brand-soft:#f2dfd2;
      --green-soft:#dfe9e4;
      --shadow:0 16px 40px rgba(31,41,51,.10);
      --radius:20px;
      --font-display: Georgia, "Times New Roman", serif;
      --font-body: Inter, "Segoe UI", Arial, sans-serif;
    }

    *{box-sizing:border-box}
    html{scroll-behavior:smooth}
    body{
      margin:0;
      background:
        radial-gradient(circle at top left, rgba(180,83,42,.14), transparent 34%),
        radial-gradient(circle at top right, rgba(36,78,70,.14), transparent 32%),
        var(--bg);
      color:var(--ink);
      font-family:var(--font-body);
      line-height:1.55;
    }

    button,input,textarea{font:inherit}
    button{cursor:pointer}
    a{color:inherit}

    .topbar{
      position:sticky;
      top:0;
      z-index:50;
      background:rgba(244,239,230,.88);
      backdrop-filter:blur(16px);
      border-bottom:1px solid rgba(31,41,51,.14);
    }

    .header-inner{
      max-width:1180px;
      margin:auto;
      min-height:76px;
      padding:12px 20px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:18px;
    }

    .brand{
      display:flex;
      align-items:center;
      gap:12px;
      min-width:220px;
    }

    .brand-mark{
      width:44px;
      height:44px;
      border-radius:14px;
      display:grid;
      place-items:center;
      background:linear-gradient(135deg,var(--brand),#d47a43);
      color:#fff;
      font-size:22px;
      box-shadow:0 10px 26px rgba(180,83,42,.22);
    }

    .brand h1{
      margin:0;
      font-family:var(--font-display);
      font-size:22px;
      letter-spacing:.2px;
      line-height:1.1;
    }

    .brand span{
      display:block;
      font-size:12px;
      color:var(--muted);
      margin-top:2px;
    }

    .nav{
      display:flex;
      gap:8px;
      align-items:center;
      flex-wrap:wrap;
      justify-content:flex-end;
    }

    .nav button{
      border:1px solid rgba(31,41,51,.16);
      background:rgba(255,250,242,.7);
      color:var(--ink);
      padding:10px 15px;
      border-radius:999px;
      transition:.18s ease;
      font-weight:700;
      font-size:14px;
    }

    .nav button:hover,
    .nav button.active{
      background:var(--ink);
      color:#fffaf2;
      transform:translateY(-1px);
      box-shadow:0 8px 20px rgba(31,41,51,.12);
    }

    main{
      max-width:1180px;
      margin:0 auto;
      padding:28px 20px 80px;
    }

    .hero{
      display:grid;
      grid-template-columns:1.35fr .65fr;
      gap:22px;
      margin-bottom:26px;
    }

    .hero-card{
      border:1px solid rgba(31,41,51,.12);
      background:linear-gradient(135deg,rgba(255,250,242,.95),rgba(255,255,255,.68));
      border-radius:var(--radius);
      padding:26px;
      box-shadow:var(--shadow);
      overflow:hidden;
      position:relative;
    }

    .hero-card:after{
      content:"";
      position:absolute;
      right:-80px;
      bottom:-90px;
      width:220px;
      height:220px;
      border-radius:50%;
      background:rgba(180,83,42,.12);
    }

    .hero-card h2{
      margin:0 0 8px;
      font-family:var(--font-display);
      font-size:clamp(28px,4vw,46px);
      line-height:1.05;
      position:relative;
      z-index:1;
    }

    .hero-card p{
      margin:0;
      color:var(--muted);
      max-width:680px;
      position:relative;
      z-index:1;
    }

    .stat-card{
      border:1px solid rgba(31,41,51,.12);
      background:var(--surface);
      border-radius:var(--radius);
      padding:22px;
      box-shadow:0 10px 28px rgba(31,41,51,.08);
      display:grid;
      gap:10px;
      align-content:center;
    }

    .stat-line{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
      padding:10px 0;
      border-bottom:1px dashed var(--line);
    }

    .stat-line:last-child{border-bottom:none}
    .stat-line strong{
      font-size:22px;
      color:var(--brand);
      font-family:var(--font-display);
    }
    .stat-line span{color:var(--muted);font-size:14px}

    .section-head{
      display:flex;
      align-items:flex-end;
      justify-content:space-between;
      gap:16px;
      margin:18px 0;
    }

    .section-head h2{
      margin:0;
      font-size:24px;
      font-family:var(--font-display);
    }

    .section-head p{
      margin:3px 0 0;
      color:var(--muted);
      font-size:14px;
    }

    .grid{
      display:grid;
      grid-template-columns:repeat(auto-fill,minmax(255px,1fr));
      gap:20px;
    }

    .card{
      border:1px solid rgba(31,41,51,.12);
      background:rgba(255,255,255,.78);
      border-radius:18px;
      overflow:hidden;
      transition:.2s ease;
      min-width:0;
      text-decoration:none;
      display:flex;
      flex-direction:column;
      color:var(--ink);
    }

    .card:hover{
      border-color:var(--brand);
      transform:translateY(-4px);
      box-shadow:var(--shadow);
    }

    .thumb{
      aspect-ratio:16/9;
      background:linear-gradient(135deg,var(--brand-soft),#fffaf2);
      position:relative;
      overflow:hidden;
      display:grid;
      place-items:center;
    }

    .thumb img{
      width:100%;
      height:100%;
      object-fit:cover;
      display:block;
    }

    .placeholder{
      width:64px;
      height:64px;
      border-radius:20px;
      display:grid;
      place-items:center;
      background:rgba(255,255,255,.55);
      border:1px solid rgba(31,41,51,.12);
      color:var(--brand);
      font-family:var(--font-display);
      font-size:34px;
      font-weight:700;
    }

    .tag{
      position:absolute;
      top:12px;
      left:12px;
      padding:6px 10px;
      border-radius:999px;
      background:rgba(31,41,51,.82);
      color:#fffaf2;
      font-size:12px;
      font-weight:800;
    }

    .card-body{
      padding:16px;
      flex:1;
      display:flex;
      flex-direction:column;
      gap:8px;
    }

    .card-title{
      margin:0;
      font-family:var(--font-display);
      font-size:20px;
      line-height:1.22;
    }

    .card-desc{
      margin:0;
      color:var(--muted);
      font-size:14px;
      flex:1;
    }

    .meta{
      margin-top:8px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      font-size:13px;
      font-weight:800;
      color:var(--brand-2);
    }

    .empty{
      border:1px dashed var(--line);
      background:rgba(255,250,242,.72);
      padding:34px 18px;
      border-radius:18px;
      text-align:center;
      color:var(--muted);
    }

    .back{
      display:inline-flex;
      align-items:center;
      gap:6px;
      border:0;
      background:transparent;
      color:var(--brand);
      font-weight:800;
      padding:8px 0;
      margin-bottom:12px;
    }

    .course-layout{
      display:grid;
      grid-template-columns:1.45fr .55fr;
      gap:20px;
      align-items:start;
    }

    .player-card,.playlist-card,.panel{
      border:1px solid rgba(31,41,51,.12);
      background:rgba(255,255,255,.82);
      border-radius:var(--radius);
      box-shadow:0 10px 30px rgba(31,41,51,.07);
    }

    .player-card{overflow:hidden}
    .player{
      width:100%;
      aspect-ratio:16/9;
      border:0;
      background:#111;
      display:block;
    }

    .lesson-info{
      padding:18px;
    }

    .lesson-info h2{
      font-family:var(--font-display);
      margin:0 0 4px;
    }

    .lesson-info p{
      margin:0;
      color:var(--muted);
      font-size:14px;
      white-space:pre-wrap;
    }

    .playlist-card{
      padding:14px;
      position:sticky;
      top:96px;
    }

    .playlist-card h3{
      margin:4px 4px 12px;
      font-family:var(--font-display);
      font-size:20px;
    }

    .video-list{
      display:grid;
      gap:9px;
    }

    .video-item{
      border:1px solid var(--line);
      background:#fffaf2;
      border-radius:14px;
      padding:12px;
      display:flex;
      gap:10px;
      align-items:center;
      text-align:left;
      width:100%;
      transition:.18s ease;
    }

    .video-item:hover,
    .video-item.active{
      border-color:var(--brand);
      background:var(--brand-soft);
      transform:translateY(-1px);
    }

    .num{
      width:28px;
      height:28px;
      border-radius:10px;
      background:var(--ink);
      color:#fff;
      display:grid;
      place-items:center;
      flex:0 0 auto;
      font-weight:900;
      font-size:12px;
    }

    .video-item div:last-child{
      min-width:0;
    }

    .video-item strong{
      display:block;
      font-size:14px;
      line-height:1.28;
    }

    .video-item span{
      display:block;
      color:var(--muted);
      font-size:12px;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }

    .panel{
      padding:20px;
      margin-bottom:18px;
    }

    .panel h2{
      margin:0 0 14px;
      padding-bottom:10px;
      border-bottom:1px solid var(--line);
      font-family:var(--font-display);
      font-size:22px;
    }

    .form-grid{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:12px;
    }

    .field.full{grid-column:1/-1}
    label{
      display:block;
      font-size:13px;
      color:var(--ink);
      font-weight:900;
      margin-bottom:6px;
    }

    input,textarea{
      width:100%;
      border:1px solid var(--line);
      background:#fffaf2;
      color:var(--ink);
      border-radius:12px;
      padding:11px 12px;
      outline:none;
      transition:.18s ease;
    }

    input:focus,textarea:focus{
      border-color:var(--brand);
      box-shadow:0 0 0 4px rgba(180,83,42,.10);
    }

    textarea{
      resize:vertical;
      min-height:72px;
    }

    .actions{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      align-items:center;
      margin-top:14px;
    }

    .btn{
      border:0;
      background:var(--brand);
      color:#fff;
      padding:11px 16px;
      border-radius:14px;
      font-weight:900;
      transition:.18s ease;
    }

    .btn:hover{transform:translateY(-1px);box-shadow:0 10px 24px rgba(180,83,42,.18)}
    .btn.secondary{background:var(--brand-2)}
    .btn.ghost{background:transparent;color:var(--ink);border:1px solid var(--line)}
    .btn.danger{background:#9d3e36}

    .mini-list{display:grid;gap:12px}
    .admin-course,.admin-app{
      border:1px solid var(--line);
      background:#fffaf2;
      border-radius:18px;
      padding:14px;
    }

    .admin-row{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
      flex-wrap:wrap;
    }

    .admin-main{
      display:flex;
      align-items:center;
      gap:12px;
      min-width:0;
      flex:1;
    }

    .mini-thumb{
      width:74px;
      aspect-ratio:16/9;
      object-fit:cover;
      border-radius:12px;
      border:1px solid var(--line);
      background:var(--brand-soft);
      flex:0 0 auto;
      display:grid;
      place-items:center;
      color:var(--brand);
      font-weight:900;
      font-family:var(--font-display);
      overflow:hidden;
    }

    .mini-thumb img{
      width:100%;
      height:100%;
      object-fit:cover;
    }

    .admin-title{
      min-width:0;
    }

    .admin-title strong{
      display:block;
      font-family:var(--font-display);
      font-size:18px;
      line-height:1.2;
    }

    .admin-title small{
      display:block;
      color:var(--muted);
      overflow:hidden;
      text-overflow:ellipsis;
      white-space:nowrap;
      max-width:520px;
    }

    .small-btn{
      border:1px solid var(--line);
      background:#fff;
      color:var(--ink);
      padding:8px 10px;
      border-radius:11px;
      font-weight:900;
      font-size:13px;
    }

    .small-btn.danger{
      color:#9d3e36;
      border-color:#d8b0aa;
    }

    .video-admin{
      margin:10px 0 0 86px;
      display:grid;
      gap:8px;
    }

    .video-admin-row{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      border-left:4px solid var(--brand-soft);
      background:#fff;
      padding:10px;
      border-radius:12px;
      font-size:13px;
    }

    .add-video-box{
      margin:12px 0 0 86px;
      border-top:1px dashed var(--line);
      padding-top:12px;
    }

    .notice{
      border:1px solid rgba(180,83,42,.25);
      background:rgba(242,223,210,.56);
      padding:12px 14px;
      border-radius:14px;
      color:#6b3b25;
      font-size:13px;
      margin-bottom:14px;
    }

    .toast{
      position:fixed;
      right:18px;
      bottom:18px;
      background:var(--ink);
      color:#fffaf2;
      padding:12px 14px;
      border-radius:14px;
      box-shadow:var(--shadow);
      font-weight:800;
      opacity:0;
      transform:translateY(12px);
      pointer-events:none;
      transition:.25s ease;
      z-index:80;
      max-width:310px;
    }

    .toast.show{
      opacity:1;
      transform:translateY(0);
    }

    .login{
      max-width:420px;
      margin:44px auto;
    }

    .hint{
      color:var(--muted);
      font-size:12px;
      margin-top:6px;
    }

    .hidden{display:none!important}

    @media (max-width:900px){
      .hero,.course-layout{grid-template-columns:1fr}
      .playlist-card{position:static}
      .form-grid{grid-template-columns:1fr}
      .add-video-box,.video-admin{margin-left:0}
    }

    @media (max-width:620px){
      .header-inner{
        align-items:flex-start;
        padding:11px 14px;
      }
      .brand{min-width:100%;justify-content:flex-start}
      .brand-mark{width:40px;height:40px;border-radius:13px}
      .brand h1{font-size:20px}
      .nav{
        width:100%;
        display:grid;
        grid-template-columns:repeat(3,1fr);
      }
      .nav button{
        padding:9px 8px;
        font-size:13px;
      }
      main{padding:18px 14px 60px}
      .hero-card{padding:20px}
      .hero-card h2{font-size:30px}
      .grid{
        grid-template-columns:repeat(2,minmax(0,1fr));
        gap:12px;
      }
      .card{border-radius:15px}
      .card-body{padding:12px}
      .card-title{font-size:16px}
      .card-desc{font-size:12px}
      .meta{font-size:12px}
      .tag{top:8px;left:8px;font-size:10px;padding:5px 8px}
      .placeholder{width:48px;height:48px;border-radius:16px;font-size:26px}
      .section-head{align-items:flex-start;flex-direction:column;gap:5px}
      .panel{padding:15px;border-radius:18px}
      .admin-main{align-items:flex-start}
      .mini-thumb{width:64px}
      .admin-row{align-items:flex-start}
      .video-admin-row{align-items:flex-start;flex-direction:column}
      .player-card,.playlist-card{border-radius:18px}
    }
  </style>
</head>
<body>
  <header class="topbar">
    <div class="header-inner">
      <div class="brand">
        <div class="brand-mark">▶</div>
        <div>
          <h1>Lớp Học Video</h1>
          <span>Học video, quản lý khóa học và công cụ học tập</span>
        </div>
      </div>
      <nav class="nav" aria-label="Điều hướng chính">
        <button id="navCourses" class="active" type="button">Khóa học</button>
        <button id="navApps" type="button">App</button>
        <button id="navAdmin" type="button">Quản trị</button>
      </nav>
    </div>
  </header>

  <main id="app"></main>
  <div id="toast" class="toast"></div>

  <script>
    /********************************************************************
     * LƯU Ý QUAN TRỌNG
     * - File này chạy độc lập bằng localStorage.
     * - Nếu môi trường của bạn có window.storage, web sẽ ưu tiên dùng
     *   window.storage để dữ liệu có khả năng dùng chung/persistent hơn.
     * - Muốn dữ liệu dùng chung thật sự cho mọi người trên internet,
     *   cần gắn backend/cloud storage như Firebase, Supabase hoặc Apps Script.
     ********************************************************************/

    const STORAGE_KEY = "hocvien_courses_v2";
    const APPS_KEY = "hocvien_apps_v2";
    const PASS_HASH_KEY = "hocvien_admin_pass_hash_v2";
    const LEGACY_PASS_KEY = "admin_pass_v1";
    const DEFAULT_PASS = "admin123";

    const state = {
      view: "courses",
      courses: [],
      apps: [],
      currentCourseId: null,
      currentVideoId: null,
      isAdmin: false
    };

    const app = document.getElementById("app");

    const store = {
      async get(key){
        try{
          if(window.storage && typeof window.storage.get === "function"){
            const data = await window.storage.get(key, true);
            return data ? data.value : null;
          }
        }catch(e){}
        return localStorage.getItem(key);
      },
      async set(key,value){
        try{
          if(window.storage && typeof window.storage.set === "function"){
            await window.storage.set(key, value, true);
            return;
          }
        }catch(e){}
        localStorage.setItem(key, value);
      },
      async remove(key){
        try{
          if(window.storage && typeof window.storage.delete === "function"){
            await window.storage.delete(key, true);
            return;
          }
        }catch(e){}
        localStorage.removeItem(key);
      }
    };

    function uid(){
      return Math.random().toString(36).slice(2, 10) + Date.now().toString(36).slice(-4);
    }

    function escapeHtml(value){
      const div = document.createElement("div");
      div.textContent = value == null ? "" : String(value);
      return div.innerHTML;
    }

    function firstLetter(text){
      const t = (text || "H").trim();
      return escapeHtml(t.charAt(0).toUpperCase() || "H");
    }

    function toast(message){
      const el = document.getElementById("toast");
      el.textContent = message;
      el.classList.add("show");
      clearTimeout(window.__toastTimer);
      window.__toastTimer = setTimeout(()=> el.classList.remove("show"), 2200);
    }

    async function sha256(text){
      const data = new TextEncoder().encode(text);
      const hash = await crypto.subtle.digest("SHA-256", data);
      return Array.from(new Uint8Array(hash)).map(b=>b.toString(16).padStart(2,"0")).join("");
    }

    async function getPassHash(){
      let saved = await store.get(PASS_HASH_KEY);
      if(saved) return saved;

      // Hỗ trợ chuyển từ bản cũ nếu từng lưu mật khẩu plain text.
      const legacy = await store.get(LEGACY_PASS_KEY);
      saved = await sha256(legacy || DEFAULT_PASS);
      await store.set(PASS_HASH_KEY, saved);
      return saved;
    }

    async function setPass(newPass){
      await store.set(PASS_HASH_KEY, await sha256(newPass));
      await store.remove(LEGACY_PASS_KEY);
    }

    async function loadData(){
      try{
        const courses = await store.get(STORAGE_KEY);
        state.courses = courses ? JSON.parse(courses) : [];
      }catch(e){
        state.courses = [];
      }

      try{
        const apps = await store.get(APPS_KEY);
        state.apps = apps ? JSON.parse(apps) : [];
      }catch(e){
        state.apps = [];
      }

      // Seed dữ liệu mẫu rất nhẹ nếu chưa có gì, có thể xóa trong admin.
      if(!state.courses.length && !state.apps.length){
        state.courses = [
          {
            id: uid(),
            title: "Khóa học mẫu",
            description: "Vào Quản trị để xóa khóa học mẫu và thêm bài giảng thật của anh/chị.",
            image: "",
            videos: [
              {
                id: uid(),
                title: "Video hướng dẫn mẫu",
                url: "https://www.youtube.com/watch?v=dQw4w9WgXcQ",
                note: "Thay bằng link YouTube hoặc Google Drive của anh/chị trong phần Quản trị."
              }
            ]
          }
        ];
        state.apps = [
          {
            id: uid(),
            title: "App mẫu",
            url: "https://www.google.com",
            description: "Click để mở công cụ ở tab mới. Có thể xóa trong phần Quản trị.",
            image: ""
          }
        ];
        await saveCourses();
        await saveApps();
      }
    }

    async function saveCourses(){
      await store.set(STORAGE_KEY, JSON.stringify(state.courses));
    }

    async function saveApps(){
      await store.set(APPS_KEY, JSON.stringify(state.apps));
    }

    function normalizeUrl(url){
      return (url || "").trim();
    }

    function getYoutubeId(url){
      const raw = normalizeUrl(url);
      if(!raw) return "";

      const patterns = [
        /youtu\.be\/([A-Za-z0-9_-]{6,})/,
        /youtube\.com\/watch\?[^#]*v=([A-Za-z0-9_-]{6,})/,
        /youtube\.com\/embed\/([A-Za-z0-9_-]{6,})/,
        /youtube\.com\/shorts\/([A-Za-z0-9_-]{6,})/,
        /youtube\.com\/live\/([A-Za-z0-9_-]{6,})/
      ];

      for(const p of patterns){
        const m = raw.match(p);
        if(m) return m[1];
      }

      try{
        const u = new URL(raw);
        if(u.hostname.includes("youtube.com")) return u.searchParams.get("v") || "";
      }catch(e){}
      return "";
    }

    function getDriveId(url){
      const raw = normalizeUrl(url);
      if(!raw || !raw.includes("drive.google.com")) return "";

      const patterns = [
        /drive\.google\.com\/file\/d\/([^/]+)/,
        /drive\.google\.com\/open\?id=([^&]+)/,
        /drive\.google\.com\/uc\?[^#]*id=([^&]+)/,
        /drive\.google\.com\/drive\/folders\/([^/?#]+)/
      ];

      for(const p of patterns){
        const m = raw.match(p);
        if(m) return decodeURIComponent(m[1]);
      }

      try{
        const u = new URL(raw);
        return u.searchParams.get("id") || "";
      }catch(e){}
      return "";
    }

    function toEmbedUrl(url){
      const raw = normalizeUrl(url);
      const yid = getYoutubeId(raw);
      if(yid) return "https://www.youtube.com/embed/" + encodeURIComponent(yid) + "?rel=0&modestbranding=1";

      const did = getDriveId(raw);
      if(did) return "https://drive.google.com/file/d/" + encodeURIComponent(did) + "/preview";

      // Fallback chỉ dùng cho iframe, không hiển thị URL gốc ra giao diện người học.
      return raw;
    }

    })();
  </script>
