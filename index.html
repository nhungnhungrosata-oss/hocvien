<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Học Viên Online</title>
  <meta name="description" content="Website học video, quản lý khóa học và app học tập." />
  <style>
    :root{
      --bg:#f3f6fb;
      --bg-2:#eaf0ff;
      --surface:#ffffff;
      --surface-soft:#f8fafc;
      --ink:#0f172a;
      --text:#1e293b;
      --muted:#64748b;
      --line:#e2e8f0;
      --primary:#2563eb;
      --primary-2:#1d4ed8;
      --primary-soft:#dbeafe;
      --accent:#f97316;
      --accent-soft:#ffedd5;
      --success:#0f766e;
      --success-soft:#ccfbf1;
      --danger:#dc2626;
      --danger-soft:#fee2e2;
      --shadow-sm:0 8px 22px rgba(15,23,42,.07);
      --shadow:0 24px 70px rgba(15,23,42,.12);
      --radius:22px;
      --radius-sm:16px;
      --font: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
      --font-display: ui-serif, Georgia, Cambria, "Times New Roman", serif;
    }

    *{box-sizing:border-box}
    html{scroll-behavior:smooth}
    body{
      margin:0;
      color:var(--text);
      font-family:var(--font);
      line-height:1.55;
      min-height:100vh;
      background:
        radial-gradient(circle at 8% 0%, rgba(37,99,235,.18), transparent 34%),
        radial-gradient(circle at 95% 12%, rgba(249,115,22,.14), transparent 28%),
        linear-gradient(180deg,var(--bg),#fff 72%);
    }

    button,input,textarea{font:inherit}
    button{cursor:pointer}
    a{text-decoration:none;color:inherit}
    img{max-width:100%}

    .app-shell{
      min-height:100vh;
    }

    .topbar{
      position:sticky;
      top:0;
      z-index:60;
      background:rgba(255,255,255,.78);
      border-bottom:1px solid rgba(226,232,240,.8);
      backdrop-filter:blur(18px);
      box-shadow:0 10px 34px rgba(15,23,42,.04);
    }

    .topbar-inner{
      max-width:1200px;
      margin:0 auto;
      padding:14px 20px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:18px;
    }

    .brand{
      display:flex;
      align-items:center;
      gap:13px;
      min-width:260px;
    }

    .brand-logo{
      width:48px;
      height:48px;
      border-radius:17px;
      background:
        linear-gradient(135deg, var(--primary), #60a5fa 58%, var(--accent));
      color:#fff;
      display:grid;
      place-items:center;
      font-size:24px;
      box-shadow:0 14px 34px rgba(37,99,235,.25);
      position:relative;
      overflow:hidden;
    }

    .brand-logo:after{
      content:"";
      position:absolute;
      inset:7px;
      border-radius:13px;
      border:1px solid rgba(255,255,255,.4);
    }

    .brand-copy h1{
      margin:0;
      font-size:21px;
      line-height:1.1;
      color:var(--ink);
      letter-spacing:-.02em;
    }

    .brand-copy p{
      margin:3px 0 0;
      color:var(--muted);
      font-size:12px;
      font-weight:600;
    }

    .nav{
      display:flex;
      align-items:center;
      justify-content:flex-end;
      gap:8px;
      padding:5px;
      border:1px solid rgba(226,232,240,.9);
      background:rgba(248,250,252,.75);
      border-radius:999px;
    }

    .nav button{
      border:0;
      background:transparent;
      color:var(--muted);
      padding:10px 16px;
      border-radius:999px;
      font-weight:800;
      font-size:14px;
      transition:.18s ease;
      display:flex;
      align-items:center;
      gap:7px;
    }

    .nav button:hover{
      color:var(--primary);
      background:#fff;
      box-shadow:var(--shadow-sm);
    }

    .nav button.active{
      color:#fff;
      background:linear-gradient(135deg,var(--primary),var(--primary-2));
      box-shadow:0 12px 26px rgba(37,99,235,.25);
    }

    main{
      max-width:1200px;
      margin:0 auto;
      padding:26px 20px 90px;
    }

    .hero{
      display:grid;
      grid-template-columns:minmax(0,1.45fr) minmax(280px,.55fr);
      gap:22px;
      margin:8px 0 28px;
    }

    .hero-main{
      position:relative;
      overflow:hidden;
      border:1px solid rgba(226,232,240,.85);
      border-radius:30px;
      padding:34px;
      background:
        linear-gradient(135deg, rgba(255,255,255,.96), rgba(248,250,252,.86)),
        radial-gradient(circle at right bottom, rgba(37,99,235,.13), transparent 38%);
      box-shadow:var(--shadow);
    }

    .hero-main:before{
      content:"";
      position:absolute;
      width:260px;
      height:260px;
      border-radius:50%;
      background:rgba(249,115,22,.12);
      right:-88px;
      bottom:-116px;
    }

    .hero-badge{
      position:relative;
      z-index:1;
      display:inline-flex;
      align-items:center;
      gap:8px;
      color:var(--primary-2);
      background:var(--primary-soft);
      border:1px solid rgba(37,99,235,.15);
      padding:8px 12px;
      border-radius:999px;
      font-weight:900;
      font-size:13px;
      margin-bottom:16px;
    }

    .hero-main h2{
      position:relative;
      z-index:1;
      margin:0;
      max-width:720px;
      color:var(--ink);
      font-size:clamp(32px,5vw,58px);
      line-height:.98;
      letter-spacing:-.055em;
    }

    .hero-main p{
      position:relative;
      z-index:1;
      margin:16px 0 0;
      max-width:700px;
      color:var(--muted);
      font-size:16px;
    }

    .hero-actions{
      position:relative;
      z-index:1;
      display:flex;
      flex-wrap:wrap;
      gap:10px;
      margin-top:22px;
    }

    .quick-btn{
      border:0;
      border-radius:16px;
      background:var(--ink);
      color:#fff;
      padding:12px 16px;
      font-weight:900;
      display:inline-flex;
      gap:8px;
      align-items:center;
      transition:.18s ease;
    }

    .quick-btn.secondary{
      background:#fff;
      color:var(--ink);
      border:1px solid var(--line);
    }

    .quick-btn:hover{
      transform:translateY(-2px);
      box-shadow:var(--shadow-sm);
    }

    .stats{
      display:grid;
      gap:14px;
    }

    .stat-card{
      border:1px solid rgba(226,232,240,.9);
      border-radius:24px;
      padding:20px;
      background:rgba(255,255,255,.88);
      box-shadow:var(--shadow-sm);
      position:relative;
      overflow:hidden;
    }

    .stat-card:after{
      content:"";
      position:absolute;
      width:90px;
      height:90px;
      border-radius:30px;
      background:var(--primary-soft);
      right:-35px;
      bottom:-35px;
      transform:rotate(18deg);
    }

    .stat-card.orange:after{background:var(--accent-soft)}
    .stat-card.green:after{background:var(--success-soft)}

    .stat-card span{
      display:block;
      color:var(--muted);
      font-weight:800;
      font-size:13px;
      margin-bottom:4px;
    }

    .stat-card strong{
      position:relative;
      z-index:1;
      color:var(--ink);
      font-size:32px;
      line-height:1;
      letter-spacing:-.04em;
    }

    .section-head{
      display:flex;
      align-items:flex-end;
      justify-content:space-between;
      gap:16px;
      margin:24px 0 16px;
    }

    .section-title h2{
      margin:0;
      color:var(--ink);
      font-size:28px;
      line-height:1.1;
      letter-spacing:-.035em;
    }

    .section-title p{
      margin:6px 0 0;
      color:var(--muted);
      font-size:14px;
    }

    .count-pill{
      display:inline-flex;
      align-items:center;
      gap:7px;
      background:#fff;
      border:1px solid var(--line);
      color:var(--muted);
      padding:9px 12px;
      border-radius:999px;
      font-weight:900;
      font-size:13px;
      box-shadow:var(--shadow-sm);
    }

    .grid{
      display:grid;
      grid-template-columns:repeat(auto-fill,minmax(255px,1fr));
      gap:20px;
    }

    .course-card,
    .app-card{
      display:flex;
      flex-direction:column;
      min-width:0;
      overflow:hidden;
      border:1px solid rgba(226,232,240,.9);
      background:rgba(255,255,255,.92);
      border-radius:24px;
      box-shadow:0 12px 32px rgba(15,23,42,.06);
      transition:.22s ease;
      position:relative;
      isolation:isolate;
    }

    .course-card:hover,
    .app-card:hover{
      transform:translateY(-6px);
      border-color:rgba(37,99,235,.36);
      box-shadow:0 26px 60px rgba(15,23,42,.13);
    }

    .card-thumb{
      aspect-ratio:16/9;
      position:relative;
      overflow:hidden;
      background:
        linear-gradient(135deg,#dbeafe,#ffffff 55%,#ffedd5);
      display:grid;
      place-items:center;
    }

    .card-thumb img{
      width:100%;
      height:100%;
      object-fit:cover;
      display:block;
      transform:scale(1.001);
      transition:.28s ease;
    }

    .course-card:hover .card-thumb img,
    .app-card:hover .card-thumb img{
      transform:scale(1.045);
    }

    .card-thumb:after{
      content:"";
      position:absolute;
      inset:0;
      background:linear-gradient(180deg, transparent 45%, rgba(15,23,42,.18));
      pointer-events:none;
    }

    .placeholder{
      width:74px;
      height:74px;
      border-radius:24px;
      display:grid;
      place-items:center;
      color:#fff;
      font-size:34px;
      font-weight:950;
      background:linear-gradient(135deg,var(--primary),#60a5fa);
      box-shadow:0 18px 40px rgba(37,99,235,.24);
      z-index:1;
    }

    .card-badge{
      position:absolute;
      top:12px;
      left:12px;
      z-index:2;
      padding:7px 11px;
      border-radius:999px;
      background:rgba(15,23,42,.80);
      backdrop-filter:blur(12px);
      color:#fff;
      font-weight:900;
      font-size:12px;
    }

    .card-badge.app{
      background:rgba(15,118,110,.86);
    }

    .play-float{
      position:absolute;
      right:12px;
      bottom:12px;
      width:42px;
      height:42px;
      border-radius:15px;
      background:#fff;
      color:var(--primary);
      display:grid;
      place-items:center;
      z-index:3;
      box-shadow:var(--shadow-sm);
      font-weight:950;
    }

    .card-body{
      padding:17px;
      display:flex;
      flex-direction:column;
      flex:1;
      gap:9px;
    }

    .card-title{
      margin:0;
      color:var(--ink);
      font-size:19px;
      line-height:1.25;
      letter-spacing:-.025em;
    }

    .card-desc{
      margin:0;
      color:var(--muted);
      font-size:14px;
      flex:1;
      display:-webkit-box;
      -webkit-line-clamp:2;
      -webkit-box-orient:vertical;
      overflow:hidden;
    }

    .card-meta{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
      margin-top:8px;
      padding-top:12px;
      border-top:1px solid var(--line);
      color:var(--primary);
      font-size:13px;
      font-weight:950;
    }

    .empty{
      border:1px dashed #cbd5e1;
      background:rgba(255,255,255,.70);
      border-radius:24px;
      padding:42px 22px;
      text-align:center;
      color:var(--muted);
      box-shadow:var(--shadow-sm);
    }

    .empty strong{color:var(--ink)}
    .back{
      border:0;
      background:transparent;
      color:var(--primary);
      font-weight:950;
      display:inline-flex;
      align-items:center;
      gap:8px;
      padding:8px 0;
      margin-bottom:14px;
    }

    .course-detail-layout{
      display:grid;
      grid-template-columns:minmax(0,1.45fr) minmax(290px,.55fr);
      gap:22px;
      align-items:start;
    }

    .player-shell{
      overflow:hidden;
      border:1px solid rgba(226,232,240,.95);
      background:#fff;
      border-radius:28px;
      box-shadow:var(--shadow);
    }

    .player-top{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
      padding:14px 16px;
      background:#fff;
      border-bottom:1px solid var(--line);
    }

    .window-dots{
      display:flex;
      gap:7px;
    }

    .window-dots span{
      width:10px;
      height:10px;
      border-radius:50%;
      background:#ef4444;
    }
    .window-dots span:nth-child(2){background:#f59e0b}
    .window-dots span:nth-child(3){background:#22c55e}

    .secure-note{
      color:var(--muted);
      font-size:12px;
      font-weight:850;
    }

    .video-frame{
      width:100%;
      aspect-ratio:16/9;
      display:block;
      border:0;
      background:#020617;
    }

    .lesson-info{
      padding:20px;
    }

    .lesson-info h2{
      margin:0 0 7px;
      color:var(--ink);
      font-size:25px;
      line-height:1.15;
      letter-spacing:-.035em;
    }

    .lesson-info p{
      margin:0;
      color:var(--muted);
      font-size:14px;
      white-space:pre-wrap;
    }

    .playlist{
      position:sticky;
      top:96px;
      border:1px solid rgba(226,232,240,.95);
      border-radius:28px;
      padding:16px;
      background:rgba(255,255,255,.88);
      box-shadow:var(--shadow-sm);
    }

    .playlist h3{
      margin:4px 4px 14px;
      color:var(--ink);
      font-size:20px;
      letter-spacing:-.03em;
    }

    .video-list{
      display:grid;
      gap:10px;
      max-height:calc(100vh - 175px);
      overflow:auto;
      padding-right:3px;
    }

    .video-btn{
      width:100%;
      border:1px solid var(--line);
      background:#fff;
      color:var(--text);
      border-radius:18px;
      padding:12px;
      display:flex;
      align-items:center;
      gap:11px;
      text-align:left;
      transition:.18s ease;
    }

    .video-btn:hover,
    .video-btn.active{
      border-color:rgba(37,99,235,.45);
      background:var(--primary-soft);
      transform:translateY(-1px);
    }

    .video-num{
      width:34px;
      height:34px;
      border-radius:13px;
      display:grid;
      place-items:center;
      background:var(--ink);
      color:#fff;
      font-weight:950;
      font-size:12px;
      flex:0 0 auto;
    }

    .video-btn.active .video-num{
      background:var(--primary);
    }

    .video-text{
      min-width:0;
      flex:1;
    }

    .video-text strong{
      display:block;
      color:var(--ink);
      font-size:14px;
      line-height:1.25;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }

    .video-text span{
      display:block;
      color:var(--muted);
      font-size:12px;
      margin-top:2px;
    }

    .panel{
      border:1px solid rgba(226,232,240,.95);
      background:rgba(255,255,255,.88);
      border-radius:28px;
      padding:22px;
      box-shadow:var(--shadow-sm);
      margin-bottom:18px;
    }

    .panel-head{
      display:flex;
      align-items:flex-start;
      justify-content:space-between;
      gap:12px;
      margin-bottom:16px;
      padding-bottom:14px;
      border-bottom:1px solid var(--line);
    }

    .panel h2{
      margin:0;
      color:var(--ink);
      font-size:22px;
      letter-spacing:-.035em;
    }

    .panel small{
      display:block;
      margin-top:3px;
      color:var(--muted);
      font-weight:650;
    }

    .notice{
      display:flex;
      gap:10px;
      align-items:flex-start;
      border:1px solid rgba(37,99,235,.18);
      background:rgba(219,234,254,.58);
      border-radius:20px;
      padding:14px;
      color:#1e3a8a;
      font-size:13px;
      font-weight:650;
      margin-bottom:18px;
    }

    .notice-icon{
      width:28px;
      height:28px;
      border-radius:10px;
      background:#fff;
      display:grid;
      place-items:center;
      flex:0 0 auto;
    }

    .form-grid{
      display:grid;
      grid-template-columns:repeat(2,minmax(0,1fr));
      gap:13px;
    }

    .field.full{grid-column:1/-1}
    label{
      display:block;
      margin:0 0 7px;
      color:var(--ink);
      font-size:13px;
      font-weight:950;
    }

    input,textarea{
      width:100%;
      border:1px solid #dbe3ef;
      background:#fff;
      color:var(--text);
      outline:none;
      border-radius:16px;
      padding:12px 13px;
      transition:.18s ease;
      box-shadow:0 1px 0 rgba(15,23,42,.02);
    }

    textarea{
      min-height:78px;
      resize:vertical;
    }

    input:focus,textarea:focus{
      border-color:rgba(37,99,235,.62);
      box-shadow:0 0 0 4px rgba(37,99,235,.10);
    }

    .actions{
      display:flex;
      align-items:center;
      flex-wrap:wrap;
      gap:10px;
      margin-top:15px;
    }

    .btn{
      border:0;
      border-radius:16px;
      background:linear-gradient(135deg,var(--primary),var(--primary-2));
      color:#fff;
      padding:12px 16px;
      font-weight:950;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      gap:8px;
      transition:.18s ease;
      box-shadow:0 12px 26px rgba(37,99,235,.18);
    }

    .btn:hover{
      transform:translateY(-2px);
      box-shadow:0 18px 36px rgba(37,99,235,.24);
    }

    .btn.secondary{
      background:linear-gradient(135deg,var(--success),#14b8a6);
      box-shadow:0 12px 26px rgba(15,118,110,.16);
    }

    .btn.danger{
      background:linear-gradient(135deg,var(--danger),#ef4444);
      box-shadow:0 12px 26px rgba(220,38,38,.16);
    }

    .btn.ghost{
      background:#fff;
      color:var(--ink);
      border:1px solid var(--line);
      box-shadow:none;
    }

    .admin-list{
      display:grid;
      gap:14px;
    }

    .admin-item{
      border:1px solid rgba(226,232,240,.9);
      background:#fff;
      border-radius:22px;
      padding:14px;
      transition:.18s ease;
    }

    .admin-item:hover{
      box-shadow:var(--shadow-sm);
      border-color:rgba(37,99,235,.28);
    }

    .admin-row{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
      flex-wrap:wrap;
    }

    .admin-main{
      display:flex;
      align-items:center;
      gap:13px;
      min-width:0;
      flex:1;
    }

    .mini-thumb{
      width:82px;
      aspect-ratio:16/9;
      border-radius:16px;
      overflow:hidden;
      flex:0 0 auto;
      border:1px solid var(--line);
      background:linear-gradient(135deg,var(--primary-soft),#fff,var(--accent-soft));
      display:grid;
      place-items:center;
      color:var(--primary);
      font-weight:950;
      font-size:22px;
    }

    .mini-thumb img{
      width:100%;
      height:100%;
      object-fit:cover;
      display:block;
    }

    .admin-title{
      min-width:0;
    }

    .admin-title strong{
      display:block;
      color:var(--ink);
      font-size:17px;
      line-height:1.25;
      letter-spacing:-.02em;
    }

    .admin-title small{
      display:block;
      color:var(--muted);
      margin-top:2px;
      max-width:620px;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }

    .small-btn{
      border:1px solid var(--line);
      background:#fff;
      color:var(--ink);
      border-radius:14px;
      padding:9px 12px;
      font-weight:950;
      font-size:13px;
      transition:.18s ease;
    }

    .small-btn:hover{
      transform:translateY(-1px);
      box-shadow:var(--shadow-sm);
    }

    .small-btn.danger{
      color:var(--danger);
      background:var(--danger-soft);
      border-color:rgba(220,38,38,.20);
    }

    .video-admin{
      margin:12px 0 0 95px;
      display:grid;
      gap:9px;
    }

    .video-admin-row{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
      border:1px solid var(--line);
      border-left:4px solid var(--primary);
      background:var(--surface-soft);
      border-radius:16px;
      padding:11px;
    }

    .video-admin-row strong{
      color:var(--ink);
      font-size:13px;
    }

    .video-admin-row div div{
      color:var(--muted);
      font-size:12px;
      margin-top:2px;
    }

    .add-video-box{
      margin:14px 0 0 95px;
      padding-top:14px;
      border-top:1px dashed #cbd5e1;
    }

    .login-panel{
      max-width:450px;
      margin:48px auto;
    }

    .login-hero{
      text-align:center;
      margin-bottom:18px;
    }

    .login-hero .brand-logo{
      margin:0 auto 14px;
      width:60px;
      height:60px;
      border-radius:22px;
    }

    .hint{
      color:var(--muted);
      font-size:12px;
      margin-top:8px;

</head>
<body>
  <div class="app-shell">
    <header class="topbar">
      <div class="topbar-inner">
        <div class="brand">
          <div class="brand-logo">▶</div>
          <div class="brand-copy">
            <h1>Học Viên Online</h1>
            <p>Kho bài giảng video & app học tập</p>
          </div>
        </div>

        <nav class="nav" aria-label="Điều hướng chính">
          <button id="navCourses" class="active" type="button">📚 Khóa học</button>
          <button id="navApps" type="button">🧩 App</button>
          <button id="navAdmin" type="button">🔐 Quản trị</button>
        </nav>
      </div>
    </header>

    <main id="app"></main>
  </div>

  <div id="toast" class="toast"></div>

  <script>
    /********************************************************************
     * BẢN 1 FILE HTML CHẠY ĐỘC LẬP
     * - Nếu mở trực tiếp bằng trình duyệt: dữ liệu lưu bằng localStorage.
     * - Nếu môi trường có window.storage: ưu tiên window.storage.
     * - Muốn nhiều người dùng chung 1 dữ liệu thật sự: cần backend/cloud DB.
     ********************************************************************/

    const STORAGE_KEY = "hocvien_courses_v3";
    const APPS_KEY = "hocvien_apps_v3";
    const PASS_HASH_KEY = "hocvien_admin_pass_hash_v3";
    const DEFAULT_PASS = "admin123";

    const state = {
      view: "courses",
      courses: [],
      apps: [],
      currentCourseId: null,
      currentVideoId: null,
      isAdmin: false
    };

    const app = document.getElementById("app");

    const store = {
      async get(key){
        try{
          if(window.storage && typeof window.storage.get === "function"){
            const data = await window.storage.get(key, true);
            return data ? data.value : null;
          }
        }catch(e){}
        return localStorage.getItem(key);
      },
      async set(key,value){
        try{
          if(window.storage && typeof window.storage.set === "function"){
            await window.storage.set(key, value, true);
            return;
          }
        }catch(e){}
        localStorage.setItem(key, value);
      }
    };

    function uid(){
      return Math.random().toString(36).slice(2, 10) + Date.now().toString(36).slice(-4);
    }

    function escapeHtml(value){
      const div = document.createElement("div");
      div.textContent = value == null ? "" : String(value);
      return div.innerHTML;
    }

    function firstLetter(text){
      const t = (text || "Học").trim();
      return escapeHtml(t.charAt(0).toUpperCase() || "H");
    }

    function toast(message){
      const el = document.getElementById("toast");
      el.textContent = message;
      el.classList.add("show");
      clearTimeout(window.__toastTimer);
      window.__toastTimer = setTimeout(()=> el.classList.remove("show"), 2300);
    }

    async function sha256(text){
      const data = new TextEncoder().encode(text);
      const hash = await crypto.subtle.digest("SHA-256", data);
      return Array.from(new Uint8Array(hash)).map(b=>b.toString(16).padStart(2,"0")).join("");
    }

    async function getPassHash(){
      const saved = await store.get(PASS_HASH_KEY);
      if(saved) return saved;
      const hash = await sha256(DEFAULT_PASS);
      await store.set(PASS_HASH_KEY, hash);
      return hash;
    }

    async function setPass(newPass){
      await store.set(PASS_HASH_KEY, await sha256(newPass));
    }

    async function loadData(){
      try{
        const courses = await store.get(STORAGE_KEY);
        state.courses = courses ? JSON.parse(courses) : [];
      }catch(e){
        state.courses = [];
      }

      try{
        const apps = await store.get(APPS_KEY);
        state.apps = apps ? JSON.parse(apps) : [];
      }catch(e){
        state.apps = [];
      }

      if(!state.courses.length && !state.apps.length){
        state.courses = [
          {
            id: uid(),
            title: "Khóa học mẫu",
            description: "Vào Quản trị để xóa khóa học mẫu và thêm bài giảng thật.",
            image: "",
            videos: [
              {
                id: uid(),
                title: "Video hướng dẫn mẫu",
                url: "https://www.youtube.com/watch?v=dQw4w9WgXcQ",
                note: "Thay bằng link YouTube hoặc Google Drive của bạn trong phần Quản trị."
              }
            ]
          }
        ];

        state.apps = [
          {
            id: uid(),
            title: "App mẫu",
            url: "https://www.google.com",
            description: "Click để mở công cụ ở tab mới. Có thể xóa trong phần Quản trị.",
            image: ""
          }
        ];

        await saveCourses();
        await saveApps();
      }
    }

    async function saveCourses(){
      await store.set(STORAGE_KEY, JSON.stringify(state.courses));
    }

    async function saveApps(){
      await store.set(APPS_KEY, JSON.stringify(state.apps));
    }

    function normalizeUrl(url){
      return (url || "").trim();
    }

    function getYoutubeId(url){
      const raw = normalizeUrl(url);
      if(!raw) return "";

      const patterns = [
        /youtu\.be\/([A-Za-z0-9_-]{6,})/,
        /youtube\.com\/watch\?[^#]*v=([A-Za-z0-9_-]{6,})/,
        /youtube\.com\/embed\/([A-Za-z0-9_-]{6,})/,
        /youtube\.com\/shorts\/([A-Za-z0-9_-]{6,})/,
        /youtube\.com\/live\/([A-Za-z0-9_-]{6,})/
      ];

      for(const p of patterns){
        const m = raw.match(p);
        if(m) return m[1];
      }

      try{
        const u = new URL(raw);
        if(u.hostname.includes("youtube.com")) return u.searchParams.get("v") || "";
      }catch(e){}
      return "";
    }

    function getDriveId(url){
      const raw = normalizeUrl(url);
      if(!raw || !raw.includes("drive.google.com")) return "";

      const patterns = [
        /drive\.google\.com\/file\/d\/([^/]+)/,
        /drive\.google\.com\/open\?id=([^&]+)/,
        /drive\.google\.com\/uc\?[^#]*id=([^&]+)/
      ];

      for(const p of patterns){
        const m = raw.match(p);
        if(m) return decodeURIComponent(m[1]);
      }

      try{
        const u = new URL(raw);
        return u.searchParams.get("id") || "";
      }catch(e){}
      return "";
    }

    function toEmbedUrl(url){
      const raw = normalizeUrl(url);
      const yid = getYoutubeId(raw);
      if(yid) return "https://www.youtube.com/embed/" + encodeURIComponent(yid) + "?rel=0&modestbranding=1";

      const did = getDriveId(raw);
      if(did) return "https://drive.google.com/file/d/" + encodeURIComponent(did) + "/preview";

      return raw;
    }

    function renderThumb(image,title,badge,type){
      const img = normalizeUrl(image);
      const cls = type === "app" ? "card-badge app" : "card-badge";
      return `
        <div class="card-thumb">
          <div class="${cls}">${escapeHtml(badge)}</div>
          ${
            img
            ? `<img src="${escapeHtml(img)}" alt="${escapeHtml(title)}" loading="lazy" onerror="this.remove();">`
            : `<div class="placeholder">${firstLetter(title)}</div>`
          }
          <div class="play-float">${type === "app" ? "↗" : "▶"}</div>
        </div>
      `;
    }

    function updateNav(){
      document.getElementById("navCourses").classList.toggle("active", state.view === "courses" || state.view === "courseDetail");
      document.getElementById("navApps").classList.toggle("active", state.view === "apps");
      document.getElementById("navAdmin").classList.toggle("active", state.view === "admin" || state.view === "adminLogin");
    }

    function render(){
      updateNav();
      if(state.view === "courses") return renderCourses();
      if(state.view === "courseDetail") return renderCourseDetail();
      if(state.view === "apps") return renderApps();
      if(state.view === "adminLogin") return renderAdminLogin();
      if(state.view === "admin") return renderAdmin();
    }

    function totalVideos(){
      return state.courses.reduce((sum,c)=>sum + ((c.videos || []).length), 0);
    }

    function hero(type){
      const isApp = type === "apps";
      return `
        <section class="hero">
          <div class="hero-main">
            <div class="hero-badge">${isApp ? "🧩 Kho công cụ học tập" : "🎓 Học video trực tuyến"}</div>
            <h2>${isApp ? "Tất cả app học tập trong một nơi" : "Học bài giảng video rõ ràng, gọn gàng"}</h2>
            <p>
              ${isApp
                ? "Gắn các link công cụ, bài tập, biểu mẫu, app luyện tập để học sinh mở nhanh trong tab mới."
                : "Học sinh chọn khóa học, xem bài giảng từ YouTube hoặc Google Drive qua trình phát nhúng, không lộ link gốc ở giao diện học."}
            </p>
            <div class="hero-actions">
              <button class="quick-btn" type="button" onclick="goCourses()">📚 Xem khóa học</button>
              <button class="quick-btn secondary" type="button" onclick="goApps()">🧩 Mở kho app</button>
            </div>
          </div>

          <div class="stats">
            <div class="stat-card">
              <span>Khóa học</span>
              <strong>${state.courses.length}</strong>
            </div>
            <div class="stat-card orange">
              <span>Video bài giảng</span>
              <strong>${totalVideos()}</strong>
            </div>
            <div class="stat-card green">
              <span>App / Link</span>
              <strong>${state.apps.length}</strong>
            </div>
          </div>
        </section>
      `;
    }

    function renderCourses(){
      app.innerHTML = `
        ${hero("courses")}
        <div class="section-head">
          <div class="section-title">
            <h2>Danh sách khóa học</h2>
            <p>Chọn một khóa học để bắt đầu xem bài giảng.</p>
          </div>
          <div class="count-pill">📚 ${state.courses.length} khóa học</div>
        </div>

        ${
          state.courses.length
          ? `<div class="grid">
              ${state.courses.map((c,index)=>`
                <article class="course-card" role="button" tabindex="0" data-course-id="${escapeHtml(c.id)}">
                  ${renderThumb(c.image,c.title,"Khóa " + String(index+1).padStart(2,"0"),"course")}
                  <div class="card-body">
                    <h3 class="card-title">${escapeHtml(c.title)}</h3>
                    <p class="card-desc">${escapeHtml(c.description || "Chưa có mô tả cho khóa học này.")}</p>
                    <div class="card-meta">
                      <span>${(c.videos || []).length} video</span>
                      <span>Vào học →</span>
                    </div>
                  </div>
                </article>
              `).join("")}
            </div>`
          : `<div class="empty">Chưa có khóa học nào. Vào mục <strong>Quản trị</strong> để thêm khóa học đầu tiên.</div>`
        }
      `;

      app.querySelectorAll("[data-course-id]").forEach(card=>{
        const open = ()=>{
          state.currentCourseId = card.dataset.courseId;
          state.currentVideoId = null;
          state.view = "courseDetail";
          render();
          window.scrollTo({top:0,behavior:"smooth"});
        };

        card.addEventListener("click", open);
        card.addEventListener("keydown", e=>{
          if(e.key === "Enter" || e.key === " ") open();
        });
      });
    }

    function renderCourseDetail(){
      const course = state.courses.find(c=>c.id === state.currentCourseId);
      if(!course){
        state.view = "courses";
        return render();
      }

      const videos = course.videos || [];
      if(!state.currentVideoId && videos.length) state.currentVideoId = videos[0].id;
      const video = videos.find(v=>v.id === state.currentVideoId);

      app.innerHTML = `
        <button type="button" class="back" id="backToCourses">← Quay lại danh sách khóa học</button>

        <div class="section-head">
          <div class="section-title">
            <h2>${escapeHtml(course.title)}</h2>
            <p>${escapeHtml(course.description || "Danh sách bài giảng của khóa học.")}</p>
          </div>
          <div class="count-pill">▶ ${videos.length} video</div>
        </div>

        <section class="course-detail-layout">
          <div class="player-shell">
            <div class="player-top">
              <div class="window-dots"><span></span><span></span><span></span></div>
              <div class="secure-note">Link gốc được ẩn, chỉ phát qua iframe nhúng</div>
            </div>
            ${
              video
              ? `<iframe class="video-frame" src="${escapeHtml(toEmbedUrl(video.url))}" allow="autoplay; fullscreen; picture-in-picture" allowfullscreen referrerpolicy="no-referrer"></iframe>
                 <div class="lesson-info">
                   <h2>${escapeHtml(video.title)}</h2>
                   ${video.note ? `<p>${escapeHtml(video.note)}</p>` : `<p>Đang phát video bài giảng đã chọn.</p>`}
                 </div>`
              : `<div class="empty" style="margin:18px;">Khóa học này chưa có video.</div>`
            }
          </div>

          <aside class="playlist">
            <h3>Danh sách video</h3>
            ${
              videos.length
              ? `<div class="video-list">
                  ${videos.map((v,index)=>`
                    <button type="button" class="video-btn ${v.id === state.currentVideoId ? "active" : ""}" data-video-id="${escapeHtml(v.id)}">
                      <span class="video-num">${String(index+1).padStart(2,"0")}</span>
                      <span class="video-text">
                        <strong>${escapeHtml(v.title)}</strong>
                        <span>${v.id === state.currentVideoId ? "Đang xem" : "Bấm để xem video"}</span>
                      </span>
                    </button>
                  `).join("")}
                </div>`
              : `<div class="empty">Chưa có video trong khóa học này.</div>`
            }
          </aside>
        </section>
      `;

      document.getElementById("backToCourses").onclick = ()=>{
        state.view = "courses";
        state.currentCourseId = null;
        state.currentVideoId = null;
        render();
      };

      app.querySelectorAll("[data-video-id]").forEach(btn=>{
        btn.addEventListener("click", ()=>{
          state.currentVideoId = btn.dataset.videoId;
          render();
          window.scrollTo({top:0,behavior:"smooth"});
        });
      });
    }

    function renderApps(){
      app.innerHTML = `
        ${hero("apps")}
        <div class="section-head">
          <div class="section-title">
            <h2>Kho App / Công cụ</h2>
            <p>Click vào card để mở app hoặc công cụ ở tab mới.</p>
          </div>
          <div class="count-pill">🧩 ${state.apps.length} app</div>
        </div>

        ${
          state.apps.length
          ? `<div class="grid">
              ${state.apps.map((a,index)=>`
                <a class="app-card" href="${escapeHtml(a.url)}" target="_blank" rel="noopener noreferrer">
                  ${renderThumb(a.image,a.title,"App " + String(index+1).padStart(2,"0"),"app")}
                  <div class="card-body">
                    <h3 class="card-title">${escapeHtml(a.title)}</h3>
                    <p class="card-desc">${escapeHtml(a.description || "Chưa có mô tả cho app này.")}</p>
                    <div class="card-meta">
                      <span>Công cụ</span>
                      <span>Mở tab mới ↗</span>
                    </div>
                  </div>
                </a>
              `).join("")}
            </div>`
          : `<div class="empty">Chưa có app nào. Vào mục <strong>Quản trị</strong> để thêm app/link.</div>`
        }
      `;
    }

    function renderAdminLogin(){
      app.innerHTML = `
        <section class="panel login-panel">
          <div class="login-hero">
            <div class="brand-logo">🔐</div>
            <div class="section-title">
              <h2>Đăng nhập quản trị</h2>
              <p>Quản lý khóa học, video bài giảng và kho app.</p>
            </div>
          </div>

          <div class="notice">
            <div class="notice-icon">ℹ️</div>
            <div>Mật khẩu mặc định là <strong>admin123</strong>. Nên đổi mật khẩu sau lần đăng nhập đầu tiên.</div>
          </div>

          <label for="adminPass">Mật khẩu quản trị</label>
          <input id="adminPass" type="password" placeholder="Nhập mật khẩu" autocomplete="current-password">

          <div class="actions">
            <button class="btn" id="loginBtn" type="button">Đăng nhập</button>
          </div>
        </section>
      `;

      const pass = document.getElementById("adminPass");

      const login = async ()=>{
        const hash = await getPassHash();
        const inputHash = await sha256(pass.value);
        if(inputHash === hash){
          state.isAdmin = true;
          state.view = "admin";
          render();
          toast("Đăng nhập quản trị thành công.");
        }else{
          toast("Mật khẩu không đúng.");
        }
      };

      document.getElementById("loginBtn").onclick = login;
      pass.addEventListener("keydown", e=>{
        if(e.key === "Enter") login();
      });
      setTimeout(()=>pass.focus(),50);
    }

    function imgMini(image,title){
      const img = normalizeUrl(image);
      return `
        <div class="mini-thumb">
          ${
            img
            ? `<img src="${escapeHtml(img)}" alt="${escapeHtml(title)}" onerror="this.remove();">`
            : firstLetter(title)
          }
        </div>
      `;
    }

    function renderAdmin(){
      if(!state.isAdmin){
        state.view = "adminLogin";
        return render();
      }

      app.innerHTML = `
        <div class="section-head">
          <div class="section-title">
            <h2>Bảng quản trị</h2>
            <p>Thêm khóa học, video, app và đổi mật khẩu quản trị.</p>
          </div>
          <div class="count-pill">🔐 Admin</div>
        </div>

        <div class="notice">
          <div class="notice-icon">💡</div>
          <div>Bản 1 file HTML này chạy độc lập. Nếu mở trực tiếp bằng trình duyệt, dữ liệu lưu trong máy đang dùng. Muốn nhiều người cùng dùng chung dữ liệu cần gắn backend/cloud database.</div>
        </div>

        <section class="panel">
          <div class="panel-head">
            <div>
              <h2>Thêm khóa học mới</h2>
              <small>Nhập tên, mô tả và ảnh đại diện 16:9 nếu có.</small>
            </div>
          </div>

          <div class="form-grid">
            <div class="field">
              <label for="courseTitle">Tên khóa học</label>
              <input id="courseTitle" type="text" placeholder="Ví dụ: Toán 9 - Chương 1">
            </div>
            <div class="field">
              <label for="courseImage">Link hình đại diện</label>
              <input id="courseImage" type="text" placeholder="https://...">
            </div>
            <div class="field full">
              <label for="courseDesc">Mô tả ngắn</label>
              <textarea id="courseDesc" placeholder="Mô tả ngắn về nội dung khóa học"></textarea>
            </div>
          </div>

          <div class="actions">
            <button class="btn" id="addCourseBtn" type="button">+ Thêm khóa học</button>
          </div>
        </section>

        <section class="panel">
          <div class="panel-head">
            <div>
              <h2>Danh sách khóa học</h2>
              <small>Quản lý khóa học và video bài giảng bên trong.</small>
            </div>
          </div>
          <div id="adminCourses" class="admin-list"></div>
        </section>

        <section class="panel">
          <div class="panel-head">
            <div>
              <h2>Thêm App / Link</h2>
              <small>Thêm các công cụ học tập để học sinh mở nhanh.</small>
            </div>
          </div>

          <div class="form-grid">
            <div class="field">
              <label for="appTitle">Tên app</label>
              <input id="appTitle" type="text" placeholder="Ví dụ: Bài tập trắc nghiệm">
            </div>
            <div class="field">
              <label for="appUrl">Link app</label>
              <input id="appUrl" type="text" placeholder="https://...">
            </div>
            <div class="field">
              <label for="appImage">Link hình đại diện</label>
              <input id="appImage" type="text" placeholder="https://...">
            </div>
            <div class="field full">
              <label for="appDesc">Mô tả ngắn</label>
              <textarea id="appDesc" placeholder="Mô tả ngắn về app/công cụ"></textarea>
            </div>
          </div>

          <div class="actions">
            <button class="btn secondary" id="addAppBtn" type="button">+ Thêm app</button>
          </div>
        </section>

        <section class="panel">
          <div class="panel-head">
            <div>
              <h2>Danh sách App</h2>
              <small>Xem ảnh thu nhỏ, mô tả và xóa app khi cần.</small>
            </div>
          </div>
          <div id="adminApps" class="admin-list"></div>
        </section>

        <section class="panel">
          <div class="panel-head">
            <div>
              <h2>Bảo mật quản trị</h2>
              <small>Đổi mật khẩu và đăng xuất tài khoản quản trị.</small>
            </div>
          </div>

          <div class="form-grid">
            <div class="field">
              <label for="newPass">Mật khẩu mới</label>
              <input id="newPass" type="password" placeholder="Nhập mật khẩu mới">
            </div>
            <div class="field">
              <label for="newPass2">Nhập lại mật khẩu mới</label>
              <input id="newPass2" type="password" placeholder="Nhập lại mật khẩu mới">
            </div>
          </div>

          <div class="actions">
            <button class="btn secondary" id="changePassBtn" type="button">Cập nhật mật khẩu</button>
            <button class="btn danger" id="logoutBtn" type="button">Đăng xuất</button>
          </div>
        </section>
      `;

      document.getElementById("addCourseBtn").onclick = addCourse;
      document.getElementById("addAppBtn").onclick = addApp;
      document.getElementById("changePassBtn").onclick = changePass;
      document.getElementById("logoutBtn").onclick = ()=>{
        state.isAdmin = false;
        state.view = "courses";
        render();
        toast("Đã đăng xuất quản trị.");
      };

      renderAdminCourses();
      renderAdminApps();
    }

    async function addCourse(){
      const title = document.getElementById("courseTitle").value.trim();
      const description = document.getElementById("courseDesc").value.trim();
      const image = document.getElementById("courseImage").value.trim();

      if(!title){
        toast("Vui lòng nhập tên khóa học.");
        return;
      }

      state.courses.unshift({id:uid(),title,description,image,videos:[]});
      await saveCourses();

      document.getElementById("courseTitle").value = "";
      document.getElementById("courseDesc").value = "";
      document.getElementById("courseImage").value = "";
      renderAdminCourses();
      toast("Đã thêm khóa học.");
    }

    async function addApp(){
      const title = document.getElementById("appTitle").value.trim();
      const url = document.getElementById("appUrl").value.trim();
      const description = document.getElementById("appDesc").value.trim();
      const image = document.getElementById("appImage").value.trim();

      if(!title || !url){
        toast("Vui lòng nhập tên app và link app.");
        return;
      }

      state.apps.unshift({id:uid(),title,url,description,image});
      await saveApps();

      document.getElementById("appTitle").value = "";
      document.getElementById("appUrl").value = "";
      document.getElementById("appDesc").value = "";
      document.getElementById("appImage").value = "";
      renderAdminApps();
      toast("Đã thêm app.");
    }

    async function changePass(){
      const p1 = document.getElementById("newPass").value;
      const p2 = document.getElementById("newPass2").value;

      if(!p1 || p1.length < 4){
        toast("Mật khẩu nên có ít nhất 4 ký tự.");
        return;
      }

      if(p1 !== p2){
        toast("Hai mật khẩu mới chưa trùng nhau.");
        return;
      }

      await setPass(p1);
      document.getElementById("newPass").value = "";
      document.getElementById("newPass2").value = "";
      toast("Đã cập nhật mật khẩu quản trị.");
    }

    function renderAdminCourses(){
      const wrap = document.getElementById("adminCourses");
      if(!wrap) return;

      if(!state.courses.length){
        wrap.innerHTML = `<div class="empty">Chưa có khóa học.</div>`;
        return;
      }

      wrap.innerHTML = state.courses.map(course=>`
        <div class="admin-item">
          <div class="admin-row">
            <div class="admin-main">
              ${imgMini(course.image,course.title)}
              <div class="admin-title">
                <strong>${escapeHtml(course.title)}</strong>
                <small>${escapeHtml(course.description || "Chưa có mô tả.")}</small>
                <small>${(course.videos || []).length} video bài giảng</small>
              </div>
            </div>
            <button class="small-btn danger" type="button" data-action="deleteCourse" data-course-id="${escapeHtml(course.id)}">Xóa khóa học</button>
          </div>

          <div class="video-admin">
            ${(course.videos || []).map((video,index)=>`
              <div class="video-admin-row">
                <div>
                  <strong>${String(index+1).padStart(2,"0")}. ${escapeHtml(video.title)}</strong>
                  ${video.note ? `<div>${escapeHtml(video.note)}</div>` : ""}
                </div>
                <button class="small-btn danger" type="button" data-action="deleteVideo" data-course-id="${escapeHtml(course.id)}" data-video-id="${escapeHtml(video.id)}">Xóa video</button>
              </div>
            `).join("")}
          </div>

          <div class="add-video-box">
            <div class="form-grid">
              <div class="field">
                <label>Tên video</label>
                <input type="text" class="video-title" data-course-id="${escapeHtml(course.id)}" placeholder="Ví dụ: Bài 1 - Giới thiệu">
              </div>
              <div class="field">
                <label>Link YouTube / Google Drive</label>
                <input type="text" class="video-url" data-course-id="${escapeHtml(course.id)}" placeholder="Dán link video tại đây">
              </div>
              <div class="field full">
                <label>Ghi chú</label>
                <textarea class="video-note" data-course-id="${escapeHtml(course.id)}" placeholder="Ghi chú tùy chọn cho học sinh"></textarea>
              </div>
            </div>
            <div class="actions">
              <button class="btn secondary" type="button" data-action="addVideo" data-course-id="${escapeHtml(course.id)}">+ Thêm video</button>
            </div>
          </div>
        </div>
      `).join("");

      wrap.querySelectorAll("[data-action='deleteCourse']").forEach(btn=>{
        btn.onclick = async ()=>{
          const course = state.courses.find(c=>c.id === btn.dataset.courseId);
          if(!course) return;
          if(!confirm("Xóa khóa học '" + course.title + "' và toàn bộ video bên trong?")) return;
          state.courses = state.courses.filter(c=>c.id !== btn.dataset.courseId);
          await saveCourses();
          renderAdminCourses();
          toast("Đã xóa khóa học.");
        };
      });

      wrap.querySelectorAll("[data-action='deleteVideo']").forEach(btn=>{
        btn.onclick = async ()=>{
          const course = state.courses.find(c=>c.id === btn.dataset.courseId);
          if(!course) return;
          course.videos = (course.videos || []).filter(v=>v.id !== btn.dataset.videoId);
          await saveCourses();
          renderAdminCourses();
          toast("Đã xóa video.");
        };
      });

      wrap.querySelectorAll("[data-action='addVideo']").forEach(btn=>{
        btn.onclick = async ()=>{
          const courseId = btn.dataset.courseId;
          const course = state.courses.find(c=>c.id === courseId);
          if(!course) return;

          const titleEl = wrap.querySelector(`.video-title[data-course-id="${courseId}"]`);
          const urlEl = wrap.querySelector(`.video-url[data-course-id="${courseId}"]`);
          const noteEl = wrap.querySelector(`.video-note[data-course-id="${courseId}"]`);

          const title = titleEl.value.trim();
          const url = urlEl.value.trim();
          const note = noteEl.value.trim();

          if(!title || !url){
            toast("Vui lòng nhập tên video và link video.");
            return;
          }

          if(!toEmbedUrl(url)){
            toast("Link video chưa hợp lệ.");
            return;
          }

          course.videos = course.videos || [];
          course.videos.push({id:uid(),title,url,note});
          await saveCourses();
          renderAdminCourses();
          toast("Đã thêm video.");
        };
      });
    }

    function renderAdminApps(){
      const wrap = document.getElementById("adminApps");
      if(!wrap) return;

      if(!state.apps.length){
        wrap.innerHTML = `<div class="empty">Chưa có app.</div>`;
        return;
      }

      wrap.innerHTML = state.apps.map(item=>`
        <div class="admin-item">
          <div class="admin-row">
            <div class="admin-main">
              ${imgMini(item.image,item.title)}
              <div class="admin-title">
                <strong>${escapeHtml(item.title)}</strong>
                <small>${escapeHtml(item.description || "Chưa có mô tả.")}</small>
                <small>${escapeHtml(item.url)}</small>
              </div>
            </div>
            <button class="small-btn danger" type="button" data-action="deleteApp" data-app-id="${escapeHtml(item.id)}">Xóa app</button>
          </div>
        </div>
      `).join("");

      wrap.querySelectorAll("[data-action='deleteApp']").forEach(btn=>{
        btn.onclick = async ()=>{
          const item = state.apps.find(a=>a.id === btn.dataset.appId);
          if(!item) return;
          if(!confirm("Xóa app '" + item.title + "'?")) return;
          state.apps = state.apps.filter(a=>a.id !== btn.dataset.appId);
          await saveApps();
          renderAdminApps();
          toast("Đã xóa app.");
        };
      });
    }

    function goCourses(){
      state.view = "courses";
      state.currentCourseId = null;
      state.currentVideoId = null;
      render();
      window.scrollTo({top:0,behavior:"smooth"});
    }

    function goApps(){
      state.view = "apps";
      render();
      window.scrollTo({top:0,behavior:"smooth"});
    }

    document.getElementById("navCourses").onclick = goCourses;

    document.getElementById("navApps").onclick = goApps;

    document.getElementById("navAdmin").onclick = ()=>{
      state.view = state.isAdmin ? "admin" : "adminLogin";
      render();
      window.scrollTo({top:0,behavior:"smooth"});
    };

    (async function init(){
      app.innerHTML = `<div class="empty">Đang tải dữ liệu...</div>`;
      await getPassHash();
      await loadData();
      render();
    })();
  </script>
</body>
</html>
