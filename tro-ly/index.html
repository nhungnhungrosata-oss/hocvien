<!doctype html>
<html lang="vi"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Prompt Master Pro - Tạo Prompt Chuyên Gia Chuyên Sâu</title><script src="https://cdn.tailwindcss.com"></script><script src="https://unpkg.com/@babel/standalone/babel.min.js"></script><style>html,body,#root{width:100%;height:100%;margin:0;background:#f8fafc}body{font-family:Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}.boot{min-height:100vh;display:grid;place-items:center;background:linear-gradient(135deg,#eef2ff,#f8fafc,#fff7ed);color:#0f172a;padding:24px;text-align:center}.boot-card{background:rgba(255,255,255,.94);border:1px solid #e2e8f0;border-radius:28px;padding:30px;box-shadow:0 24px 70px rgba(15,23,42,.14);max-width:560px}.spin{width:44px;height:44px;border-radius:999px;border:4px solid #dbeafe;border-top-color:#4f46e5;margin:0 auto 18px;animation:spin .9s linear infinite}@keyframes spin{to{transform:rotate(360deg)}}</style></head><body><div id="root"><div class="boot"><div class="boot-card"><div class="spin"></div><h1 style="font-size:26px;font-weight:900;margin:0 0 8px">Đang tải Prompt Master Pro...</h1><p style="color:#64748b;margin:0">Đang nạp giao diện gốc từ web Tạo Trợ Lý.</p></div></div></div><script type="module">const RAW_BASE='https://cdn.jsdelivr.net/gh/tuvungonline-gif/trolycontent@main';const root=document.getElementById('root');function showError(message){root.innerHTML=`<div class="boot"><div class="boot-card"><h1 style="font-size:24px;font-weight:900;color:#dc2626;margin:0 0 10px">Không tải được UI gốc</h1><p style="color:#475569;line-height:1.6">${message}</p><button onclick="location.reload()" style="margin-top:18px;border:0;border-radius:14px;background:#4f46e5;color:white;font-weight:900;padding:12px 16px">Tải lại</button></div></div>`}async function loadText(path){const res=await fetch(`${RAW_BASE}${path}?v=${Date.now()}`,{cache:'no-store'});if(!res.ok)throw new Error(`Không đọc được ${path}: HTTP ${res.status}`);return await res.text()}function transformTsx(source,filename){return Babel.transform(source,{filename,presets:[['typescript',{isTSX:true,allExtensions:true}],['react',{runtime:'classic'}]]}).code}function runGlobal(code){(0,eval)(code)}try{const ReactMod=await import('https://esm.sh/react@19.0.1');const ReactDOMClient=await import('https://esm.sh/react-dom@19.0.1/client?deps=react@19.0.1');const LucideReact=await import('https://esm.sh/lucide-react@0.546.0?deps=react@19.0.1');window.React=ReactMod.default||ReactMod;window.ReactDOMClient=ReactDOMClient;window.LucideReact=LucideReact;let templates=await loadText('/src/templates.ts');templates=templates.replace(/import\s+type\s+\{[\s\S]*?\}\s+from\s+["']\.\/types["'];?/g,'');templates=templates.replace(/export\s+const\s+INDUSTRY_TEMPLATES/g,'window.INDUSTRY_TEMPLATES');runGlobal(transformTsx(templates,'templates.ts'));let appSource=await loadText('/src/App.tsx');const lucideMatch=appSource.match(/import\s*\{([\s\S]*?)\}\s*from\s*["']lucide-react["'];?/);const iconNames=lucideMatch?lucideMatch[1].split(',').map(x=>x.trim()).filter(Boolean):[];appSource=appSource.replace(/import\s+React\s*,\s*\{[\s\S]*?\}\s*from\s*["']react["'];?/,'const React = window.React; const { useState, useEffect, useRef, useMemo } = React;');appSource=appSource.replace(/import\s*\{[\s\S]*?\}\s*from\s*["']lucide-react["'];?/,`const { ${iconNames.join(', ')} } = window.LucideReact;`);appSource=appSource.replace(/import\s*\{\s*INDUSTRY_TEMPLATES\s*\}\s*from\s*["']\.\/templates["'];?/,'const INDUSTRY_TEMPLATES = window.INDUSTRY_TEMPLATES;');appSource=appSource.replace(/import\s*\{\s*FormData\s*\}\s*from\s*["']\.\/types["'];?/g,'');appSource=appSource.replace(/export\s+default\s+function\s+App/g,'function App');appSource+='\nwindow.PromptMasterOriginalApp = App;';runGlobal(transformTsx(appSource,'App.tsx'));root.innerHTML='';const appRoot=document.createElement('div');appRoot.id='prompt-master-root';appRoot.style.height='100%';root.appendChild(appRoot);window.ReactDOMClient.createRoot(appRoot).render(window.React.createElement(window.PromptMasterOriginalApp))}catch(err){console.error(err);showError(err&&err.message?err.message:String(err))}</script></body></html>
